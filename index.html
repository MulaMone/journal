<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDGE — Trading Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#040d1a;--bg2:#071428;--bg3:#0a1a32;--panel:#0d1e38;--panel2:#112444;--panel3:#162c50;--border:#1a3260;--border2:#1e3d73;--border3:#2a5099;--accent:#00d4d4;--accentglow:#00d4d430;--ca:#ff8c00;--caglow:#ff8c0025;--ca15:#ff8c0015;--ca30:#ff8c0030;--ca40:#ff8c0040;--ca50:#ff8c0050;--text:#e8f0ff;--text2:#e0c97a;--text3:#c9a84c;--green:#00e676;--red:#ff4444;--amber:#ffab00}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:15px;overflow-x:hidden}body{overflow-y:scroll;-webkit-overflow-scrolling:touch}
#app{min-height:100vh;display:flex;flex-direction:column;padding-top:100px}
/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;position:fixed;top:0;left:0;right:0;z-index:201}
.logo{font-size:26px;font-weight:700;letter-spacing:4px;color:var(--accent)}
.brand-name{font-family:'Cinzel',serif;font-size:24px;font-weight:900;letter-spacing:10px;word-spacing:4px;background:linear-gradient(135deg,#ffd700 0%,#ff8c00 50%,#ffd700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;text-transform:uppercase}
.logo small{color:var(--text3);font-size:14px;font-weight:400;margin-left:10px;letter-spacing:2px}
#topbar-stats{display:flex;gap:18px;font-size:14px}
#topbar-stats span{color:var(--text3)}
#topbar-stats b{font-weight:600}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* TABS */
#tabs{display:flex;gap:1px;padding:0 14px;height:46px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;position:fixed;top:54px;left:0;right:0;z-index:200}
.tab{padding:0 14px;height:46px;display:flex;align-items:center;gap:6px;font-size:14px;letter-spacing:1px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* CONTENT */
#content{padding:20px;}
::-webkit-scrollbar{width:5px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px;margin-bottom:12px}
/* CARD */
.card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:18px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-t{font-size:12px;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
/* CHIP */
.chip{background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:13px 16px}
.chip .cl{font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.chip .cv{font-size:22px;font-weight:700}
.chip .cs{font-size:11px;color:var(--text3);margin-top:3px}
/* COLORS */
.g{color:var(--green)}.r{color:var(--red)}.a{color:var(--amber)}.b{color:var(--ca)}.m{color:var(--text3)}.ac{color:var(--accent)}
/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:2px;font-size:10px;font-weight:600}
.bg{background:#00e67615;color:var(--green);border:1px solid #00e67635}
.br{background:#ff444415;color:var(--red);border:1px solid #ff444435}
.bb{background:var(--ca15);color:var(--ca);border:1px solid var(--ca30)}
.ba{background:#ffab0015;color:var(--amber);border:1px solid #ffab0035}
.bw{background:var(--panel3);color:var(--text2);border:1px solid var(--border)}
/* Importance levels */
.imp-high{background:#ff444418;color:#ff6b6b;border:1px solid #ff444450;font-weight:700}
.imp-med{background:#ffab0018;color:#ffcc44;border:1px solid #ffab0050;font-weight:700}
.imp-low{background:#00d4d415;color:#00d4d4;border:1px solid #00d4d440;font-weight:700}
/* Mini calendar */
.cal-popup{position:absolute;z-index:99;background:var(--panel2);border:1px solid var(--border2);border-radius:5px;padding:10px;box-shadow:0 8px 32px #00000060;width:224px;margin-top:2px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav b{font-size:11px;letter-spacing:1px;color:var(--text2)}
.cal-nav button{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:3px;cursor:pointer;width:22px;height:22px;font-size:11px;line-height:1}
.cal-nav button:hover{border-color:var(--ca);color:var(--ca)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dh{font-size:15px;text-align:center;color:var(--text3);padding:6px 0;letter-spacing:1px;font-weight:700}
.cal-day{font-size:13px;text-align:center;padding:6px 3px;border-radius:3px;cursor:pointer;color:var(--text2)}
.cal-day:hover{background:var(--panel3);color:var(--text)}
.cal-day.today{border:1px solid var(--ca);color:var(--ca)}
.cal-day.selected{background:var(--ca);color:#fff;font-weight:700}
.cal-day.empty{cursor:default}
/* Import */
.drop-zone{border:2px dashed var(--border2);border-radius:5px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--panel2)}
.drop-zone:hover,.drop-zone.over{border-color:var(--ca);background:var(--panel3)}
.drop-zone input[type=file]{display:none}
.drop-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.preview-tbl{width:100%;border-collapse:collapse;font-size:10px;margin-top:8px}
.preview-tbl th{padding:6px 8px;text-align:left;color:var(--text3);font-size:11px;letter-spacing:1px;border-bottom:1px solid var(--border)}
.preview-tbl td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-size:12px}
.imp-msg{padding:10px 14px;border-radius:4px;font-size:11px;margin-bottom:12px;font-family:'Courier New',monospace}
.imp-ok{background:#00e67615;border:1px solid #00e67640;color:var(--green)}
.imp-err{background:#ff444415;border:1px solid #ff444440;color:var(--red)}
.imp-info{background:var(--ca15);border:1px solid var(--ca30);color:var(--ca)}
.sync-status{display:flex;align-items:center;gap:8px;font-size:10px;padding:8px 12px;border-radius:3px;background:var(--panel3);border:1px solid var(--border);font-family:"Courier New",monospace}
.sync-dot-on{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.sync-dot-off{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.field-group{margin-bottom:10px}
.field-group label{font-size:11px;letter-spacing:1.5px;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase}
.plt-btn{padding:7px 16px;border:1px solid var(--border2);background:var(--panel2);color:var(--text2);font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;border-radius:3px;cursor:pointer;transition:all .15s}
.plt-btn.sel{border-color:var(--ca);color:var(--ca);background:var(--ca15)}
.plt-btn:hover{border-color:var(--ca);color:var(--ca)}
/* +/- spinner */
.ctr-wrap{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;background:var(--panel2)}
.ctr-wrap input{border:none;border-radius:0;border-left:1px solid var(--border);border-right:1px solid var(--border);text-align:center;width:100%;min-width:0}
.ctr-btn{background:var(--panel3);border:none;color:var(--text2);font-size:15px;cursor:pointer;width:30px;height:32px;flex-shrink:0;line-height:1}
.ctr-btn:hover{background:var(--border2);color:var(--text)}
/* GRADE */
.gr{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:2px;font-size:12px;font-weight:700}
.grA{background:#00e67618;color:var(--green);border:1px solid #00e67638}
.grB{background:var(--ca15);color:var(--ca);border:1px solid var(--ca30)}
.grC{background:#ffab0018;color:var(--amber);border:1px solid #ffab0038}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:8px 10px;text-align:left;color:var(--text3);font-size:11px;letter-spacing:1px;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);font-size:13px}
.tbl tr.tr-click:hover td{background:var(--panel2);cursor:pointer}
.tbl tr.exp-open td{background:var(--panel2)}
/* SECTION HEADER */
.sh{font-size:13px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sh:before{content:'';width:3px;height:13px;background:var(--ca);display:inline-block}
/* LEVEL ROW */
.lvrow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.lvrow.checked .lv-label{text-decoration:line-through;opacity:0.38}
.lvrow.checked .lv-badge{opacity:0.35}
.lv-check{width:18px;height:18px;border-radius:3px;border:1px solid var(--border2);background:var(--panel3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.lv-check:hover{border-color:var(--ca)}
.lv-check.on{background:var(--ca15);border-color:var(--ca40)}
.lv-check.on::after{content:"✓";font-size:11px;color:var(--ca);font-weight:700}
.lvrow:last-child{border-bottom:none}
/* QUOTE */
.qblock{background:var(--panel2);border-left:3px solid var(--ca);padding:11px 14px;border-radius:0 4px 4px 0;margin-bottom:12px}
.qtext{font-size:13px;color:var(--text2);font-style:italic;line-height:1.7}
.qauth{font-size:11px;color:var(--text3);margin-top:5px;letter-spacing:1px}
/* FORM */
.fg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:10px}
.fg .s2{grid-column:span 2}.fg .s4{grid-column:span 4}
input,select,textarea{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Courier New',monospace;font-size:13px;padding:8px 10px;border-radius:3px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ca)}
select option{background:var(--panel2)}
label{font-size:11px;letter-spacing:1.5px;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase}
/* BTN */
.btn{padding:7px 16px;border:1px solid var(--ca);background:transparent;color:var(--ca);font-family:'Courier New',monospace;font-size:12px;letter-spacing:1px;border-radius:3px;cursor:pointer}
.btn:hover{background:var(--caglow)}
.btn-g{border-color:var(--green);color:var(--green)}
.btn-g:hover{background:#00e67610}
.btn-r{border-color:var(--red);color:var(--red)}
.btn-r:hover{background:#ff444410}
/* MISC */
.sep{height:1px;background:var(--border);margin:12px 0}
.xs{font-size:12px}.sm{font-size:13px}.fw7{font-weight:700}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.row{display:flex;align-items:center}.rjb{display:flex;align-items:center;justify-content:space-between}.gap8{gap:8px}.gap12{gap:12px}
.pbc{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:9px}
.setup-title{font-size:16px;font-weight:700;letter-spacing:.5px;color:var(--text);font-family:'Arial','Helvetica',sans-serif}
.opp{background:linear-gradient(135deg,var(--panel2),var(--panel3));border:1px solid #1e3d73;border-radius:4px;padding:14px;margin-bottom:10px}
/* SVG CHART */
.chart-wrap{overflow:hidden;margin-top:6px}
svg text{font-family:'Courier New',monospace}

/* ─── TABLE SCROLL WRAPPER ───────────────────────────────────── */
.tbl-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ─── MOBILE PREMIUM REDESIGN ────────────────────────────────── */
#m-bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:80px;background:#071428;border-top:1px solid #1a3260;z-index:500}
#m-bnav .bn-items{display:flex;height:100%;align-items:stretch}
#m-bnav .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#c9a84c;font-size:9px;letter-spacing:.8px;text-transform:uppercase;font-family:'Courier New',monospace;border:none;background:none;padding:0;-webkit-tap-highlight-color:transparent;transition:color .15s}
#m-bnav .bn-item.act{color:#00d4d4}
#m-bnav .bn-item:active{opacity:.7}
#m-bnav .bn-icon{font-size:26px;line-height:1}
#m-bnav .bn-fab-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#m-bnav .bn-fab{width:58px;height:58px;border-radius:15px;background:linear-gradient(145deg,#ff8c00,#e67500);display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:300;margin-top:-20px;border:2.5px solid #040d1a;flex-shrink:0;transition:transform .15s;box-shadow:0 4px 20px #ff8c0050}
#m-bnav .bn-fab:active{transform:scale(.93)}
#m-bnav .bn-fab-lbl{font-size:9px;color:#ff8c00;letter-spacing:.8px;text-transform:uppercase;font-family:'Courier New',monospace;margin-top:2px}
.m-trade-card{background:#0d1e38;border:1px solid #1a3260;border-radius:10px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.m-trade-card:active{border-color:#00d4d450}
.m-trade-card.expanded{border-color:#00d4d430}
.m-tc-top{display:flex;align-items:center;justify-content:space-between;padding:13px 13px;min-height:56px}
.m-tc-left{display:flex;align-items:center;gap:10px}
.m-dir-badge{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;letter-spacing:.5px}
.m-dir-l{background:#00e67618;border:1px solid #00e67645;color:#00e676}
.m-dir-s{background:#ff444418;border:1px solid #ff444445;color:#ff4444}
.m-tc-inst{font-size:16px;font-weight:700;color:#e8f0ff;letter-spacing:.5px}
.m-tc-setup{font-size:11px;color:#c9a84c;margin-top:3px;letter-spacing:.3px}
.m-tc-right{text-align:right}
.m-tc-pnl{font-size:19px;font-weight:700;letter-spacing:.5px}
.m-tc-pts{font-size:10px;color:#c9a84c;margin-top:2px;font-family:'Courier New',monospace}
.m-tc-meta{display:flex;padding:0 13px 12px;gap:6px}
.m-mc{flex:1;background:#071428;border-radius:6px;padding:7px 4px;text-align:center;min-width:0}
.m-mc-lbl{font-size:9px;color:#c9a84c;letter-spacing:.5px;text-transform:uppercase;font-family:'Courier New',monospace}
.m-mc-val{font-size:12px;color:#e0c97a;font-weight:600;margin-top:3px;font-family:'Courier New',monospace}
.m-tc-expand{padding:10px 12px;border-top:1px solid #1a3260;background:#071428;display:none}
.m-trade-card.expanded .m-tc-expand{display:block}
.m-tc-exp-field{margin-bottom:7px}
.m-tc-exp-lbl{font-size:10px;color:#c9a84c;letter-spacing:1px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:3px}
.m-tc-exp-val{font-size:13px;color:#e0c97a;line-height:1.6;font-family:'Courier New',monospace}
.m-tc-exp-actions{display:flex;gap:8px;margin-top:10px}
.date-sep{font-size:10px;color:#c9a84c;letter-spacing:1.5px;text-transform:uppercase;font-family:'Courier New',monospace;padding:6px 0 9px;border-bottom:1px solid #0d1e38;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.m-stat-row{display:flex;gap:8px;margin-bottom:10px}
.m-stat-card{flex:1;background:#0d1e38;border:1px solid #1a3260;border-radius:10px;padding:13px 13px;min-width:0}
.m-stat-card.hero{border-left:3px solid #00e676}
.m-stat-card.hero.neg{border-left-color:#ff4444}
.m-stat-lbl{font-size:10px;color:#c9a84c;letter-spacing:1.5px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:5px}
.m-stat-val{font-size:24px;font-weight:700;letter-spacing:.5px;line-height:1}
.m-stat-sub{font-size:10px;color:#c9a84c;margin-top:5px;font-family:'Courier New',monospace}
.m-sh{font-size:11px;color:#c9a84c;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid #1a3260}
.m-sh::before{content:'';width:2px;height:10px;background:#ff8c00;border-radius:1px;flex-shrink:0;margin-right:6px}
.m-eq-card{background:#0d1e38;border:1px solid #1a3260;border-radius:10px;padding:12px;margin-bottom:10px}
.m-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.m-card-title{font-size:11px;color:#c9a84c;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace}
.m-card-badge{font-size:10px;background:#00e67615;color:#00e676;border:1px solid #00e67635;border-radius:4px;padding:3px 9px;font-family:'Courier New',monospace}
.m-card-badge.neg{background:#ff444415;color:#ff4444;border-color:#ff444435}
.m-streak-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.m-sdot{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Courier New',monospace}
.m-sdot-w{background:#00e67620;border:1px solid #00e67640;color:#00e676}
.m-sdot-l{background:#ff444420;border:1px solid #ff444440;color:#ff4444}
.m-sdot-b{background:#0d1e38;border:1px solid #1a3260;color:#c9a84c}
.m-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.m-kpi{background:#0d1e38;border:1px solid #1a3260;border-radius:10px;padding:13px 12px;text-align:center}
.m-kpi-lbl{font-size:10px;color:#c9a84c;letter-spacing:1.5px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:5px}
.m-kpi-val{font-size:19px;font-weight:700;letter-spacing:.5px}
.m-kpi-sub{font-size:10px;color:#c9a84c;margin-top:4px;font-family:'Courier New',monospace}
.m-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.m-bar-name{font-size:11px;color:#e0c97a;width:42px;text-align:right;flex-shrink:0;font-weight:700;font-family:'Courier New',monospace}
.m-bar-track{flex:1;height:12px;background:#071428;border-radius:5px;overflow:hidden}
.m-bar-fill-g{height:100%;background:#00e676;border-radius:5px}
.m-bar-fill-r{height:100%;background:#ff4444;border-radius:5px}
.m-bar-val{font-size:11px;width:44px;flex-shrink:0;font-family:'Courier New',monospace;font-weight:700}
.m-hm-hdrs{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:4px}
.m-hm-hdr{font-size:10px;color:#c9a84c;text-align:center;font-family:'Courier New',monospace}
.m-hm-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px}
.m-hm-cell{height:28px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'Courier New',monospace;transition:opacity .15s}
.m-hm-cell:active{opacity:.7}
.hm-empty{background:#0a1422}
.hm-g3{background:#00e676;color:#013018}
.hm-g2{background:#00e67655;color:#00e676}
.hm-g1{background:#00e67628}
.hm-r3{background:#ff4444;color:#3a0000}
.hm-r2{background:#ff444455;color:#ff4444}
.hm-r1{background:#ff444428}
.hm-zero{background:#1a3260}
/* ── SETUP STAR / BREAD & BUTTER ── */
.star-btn{width:26px;height:26px;border-radius:3px;border:1px solid var(--border);background:var(--panel3);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s;flex-shrink:0;user-select:none;line-height:1}
.star-btn.on{border-color:#ffd70055;background:#ffd70012;color:#ffd700}
.star-btn.off{color:var(--border)}

function supaFetch(method,path,body){
  var headers={
    "apikey":SUPA_KEY,
    "Authorization":"Bearer "+SUPA_KEY,
    "Content-Type":"application/json"
  };
  if(method==="POST"||method==="PATCH") headers["Prefer"]="resolution=merge-duplicates,return=minimal";
  return fetch(SUPA_URL+"/rest/v1/"+path,{method:method,headers:headers,body:body?JSON.stringify(body):undefined});
}

  .then(function(r){
    if(r.ok||r.status===201||r.status===204) updateSyncStatus("synced");
    else updateSyncStatus("error");
  })
  .catch(function(){updateSyncStatus("error");});
}

function loadFromCloud(syncId,callback){
  supaFetch("GET","edge_data?user_id=eq."+encodeURIComponent(syncId)+"&select=*")
  .then(function(r){return r.json();})
  .then(function(data){
    if(!Array.isArray(data)||!data.length){if(callback) callback(false);return;}
    var d=data[0];
    if(d.trades) State.trades=d.trades;
    if(d.levels) State.levels=d.levels;
    if(d.week_levels) State.weekLevels=d.week_levels;
    // Migrate renamed setups in cloud-loaded trades
    if(State.trades&&State.trades.forEach){
      var RN={"Mean Reversion — VWAP Fade":"VWAP Fade","Mean Reversion — Extension Fade":"Extension Fade","Volume Profile — VAH/VAL":"VAH/VAL","Volume Profile — POC":"POC","Momentum — Trend Continuation":"Trend Continuation"};

        if(t.setup&&RN[t.setup]) t.setup=RN[t.setup];
        if(Array.isArray(t.setups)) t.setups=t.setups.map(function(s){return RN[s]||s;});
      });
    }
    // Re-apply migration after cloud load
    if(State.weekLevels&&State.weekLevels.forEach){
      State.weekLevels.forEach(function(l){
        if(l.l==="Weekly VWAP") l.imp="medium";
        if(l.l==="Daily Naked POC") l.imp="medium";

      if(s.weekLevelChecks) State.weekLevelChecks=s.weekLevelChecks;
      if(s.newsChecks) State.newsChecks=s.newsChecks;
      if(s.newsChecksDate) State.newsChecksDate=s.newsChecksDate;
      if(s.newsOther) State.newsOther=s.newsOther;
      if(s.newsSelected) State.newsSelected=s.newsSelected;
      if(s.newsSelectedDate) State.newsSelectedDate=s.newsSelectedDate;
      if(s.focusImprove) State.focusImprove=s.focusImprove;
      if(s.mantraNotes) State.mantraNotes=s.mantraNotes;
      if(s.starredSetups) State.starredSetups=s.starredSetups;
      if(s.notes_session) ss("notes_session",s.notes_session);
      if(s.notes_weekly) ss("notes_weekly",s.notes_weekly);
      if(s.notes_lessons) ss("notes_lessons",s.notes_lessons);
      if(s.notes_mantras&&s.notes_mantras.length) ss("notes_mantras",s.notes_mantras);
      if(s.notes_pad!==undefined&&s.notes_pad!=="") ss("notes_pad",s.notes_pad);
      if(s.playbook_custom&&s.playbook_custom.length) ss("playbook_custom",s.playbook_custom);
    }
    // ── Post-cloud level migrations — runs every load so new builtins always appear ──
    var ORDERED_BUILTINS=[
      {l:"VAH/VAL/POC",imp:"high",sess:""},
      {l:"PDH/PDL",imp:"high",sess:""},
      {l:"RTH VWAP",imp:"medium",sess:""},
      {l:"VWAP",imp:"medium",sess:""},
      {l:"BIZZ",imp:"medium",sess:"Full RTH"},
      {l:"ONH/ONL",imp:"low",sess:"Overnight"},
      {l:"OPEN",imp:"low",sess:"RTH Open"}
    ];
    ORDERED_BUILTINS.forEach(function(b){
      var exists=State.levels.some(function(l){return l.l===b.l;});
      if(!exists) State.levels.push({l:b.l,imp:b.imp,sess:b.sess,builtin:true});
      // ensure builtin flag and correct defaults
      State.levels.forEach(function(l){if(l.l===b.l){l.builtin=true;if(!l.imp)l.imp=b.imp;if(l.sess===undefined)l.sess=b.sess;}});
    });
    // Any level with blank session (not a session-specific one) gets Full RTH
    var SESSION_SPECIFIC=["ONH/ONL","OPEN"];
    State.levels.forEach(function(l){if((!l.sess||l.sess==="")&&SESSION_SPECIFIC.indexOf(l.l)===-1) l.sess="Full RTH";});
    // Re-sort so builtins appear in defined order, custom levels stay at end
    var builtinOrder=ORDERED_BUILTINS.map(function(b){return b.l;});
    State.levels.sort(function(a,b2){
      var ai=builtinOrder.indexOf(a.l);var bi=builtinOrder.indexOf(b2.l);
      if(ai>-1&&bi>-1) return ai-bi;
      if(ai>-1) return -1;
      if(bi>-1) return 1;
      return 0;
    });
    ss("trades",State.trades);ss("levels",State.levels);ss("weekLevels",State.weekLevels);
    if(callback) callback(true);
  })
  .catch(function(){if(callback) callback(false);});
}

  var el=document.getElementById("sync-status");
  if(!el) return;
  if(status==="synced"){el.textContent="✓ SYNCED";el.style.color="var(--green)";}
  else if(status==="syncing"){el.textContent="↻ SYNCING";el.style.color="var(--amber)";}
  else if(status==="error"){el.textContent="✗ SYNC ERR";el.style.color="var(--red)";}
  else if(status==="offline"){el.textContent="⊘ OFFLINE";el.style.color="var(--text3)";}
}

  var openIdx=State.levels.findIndex(function(l){return l.l==="OPEN";});
  if(openIdx>-1&&openIdx!==State.levels.length-1){var openLvl=State.levels.splice(openIdx,1)[0];State.levels.push(openLvl);}
  // Update OPEN session tag
  State.levels.forEach(function(l){if(l.l==="OPEN"&&!l.sess) l.sess="RTH Open";});
  ss("levels",State.levels);
  // Mark builtin week levels
  var WK_BUILTIN=["Weekly VAH/VAL/POC","Weekly Open","Weekly VWAP","Weekly Naked POC","Daily Naked POC","4hr Naked POC"];
  var wkChanged=false;
  State.weekLevels.forEach(function(l){
    if(WK_BUILTIN.indexOf(l.l)>-1&&!l.builtin){l.builtin=true;wkChanged=true;}
    if(l.l==="Weekly VWAP"&&l.imp!=="medium"){l.imp="medium";wkChanged=true;}
    if(l.l==="Daily Naked POC"&&l.imp!=="medium"){l.imp="medium";wkChanged=true;}
    if(l.l==="4hr Naked POC"&&l.imp!=="low"){l.imp="low";wkChanged=true;}
  });
  if(wkChanged) ss("weekLevels",State.weekLevels);

  // Clean up "Opening Range" from custom playbook if it was saved there
  try {
    var pbCustom=ls("playbook_custom",[]);
    var beforeLen=pbCustom.length;
    pbCustom=pbCustom.filter(function(e){return e.name!=="Opening Range";});
    if(pbCustom.length!==beforeLen) ss("playbook_custom",pbCustom);
  } catch(e){}

  // Migrate setup name renames in existing trades
  (function(){
    var RENAMES={
      "Mean Reversion — VWAP Fade":"VWAP Fade",
      "Mean Reversion — Extension Fade":"Extension Fade",
      "Volume Profile — VAH/VAL":"VAH/VAL",
      "Volume Profile — POC":"POC",
      "Momentum — Trend Continuation":"Trend Continuation"
    };
    var tradesChanged=false;
    State.trades.forEach(function(t){
      if(t.setup&&RENAMES[t.setup]){t.setup=RENAMES[t.setup];tradesChanged=true;}
      if(Array.isArray(t.setups)){
        t.setups=t.setups.map(function(s){if(RENAMES[s]){tradesChanged=true;return RENAMES[s];}return s;});
      }
    });
    if(tradesChanged) ss("trades",State.trades);
    // Also rename in custom playbook
    try {
      var pb=ls("playbook_custom",[]);
      var pbChanged=false;
      pb.forEach(function(e){if(RENAMES[e.name]){e.name=RENAMES[e.name];pbChanged=true;}});
      if(pbChanged) ss("playbook_custom",pb);
    } catch(e){}
  })();
})();

function dol(n){n=n||0;var abs=Math.abs(n);var str=(abs%1===0)?abs.toFixed(0):abs.toFixed(2);return(n>=0?"+":"")+"$"+str;}
function clr(n){return (n||0)>=0?"g":"r"}
function parseGoal(str,def){
  if(!str) return def;
  // Match first dollar amount like $8,000 or $8k or 8000 or 8k
  var m=str.match(/\$?([0-9][0-9,]*(?:\.[0-9]+)?)\s*k/i);
  if(m) return parseFloat(m[1].replace(/,/g,""))*1000;
  var m2=str.match(/\$?([0-9][0-9,]*(?:\.[0-9]+)?)/);
  if(m2) return parseFloat(m2[1].replace(/,/g,""))||def;
  return def;
}

function h(tag,attrs,children){
  var el=document.createElement(tag);

    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);

// ─── STATS HELPERS ───────────────────────────────────────────────────
function calcStats(trades){
  var wins=trades.filter(function(t){return t.d>0});
  var losses=trades.filter(function(t){return t.d<0});
  var total=trades.reduce(function(a,t){return a+t.d},0);
  var wr=trades.length?(wins.length/trades.length*100).toFixed(0):0;
  var avgW=wins.length?wins.reduce(function(a,t){return a+t.d},0)/wins.length:0;
  var avgL=losses.length?losses.reduce(function(a,t){return a+t.d},0)/losses.length:0;
  return{wins:wins,losses:losses,total:total,wr:wr,avgW:avgW,avgL:avgL};
}

// ─── SVG CHARTS ──────────────────────────────────────────────────────
function fmtAxisDollar(v){
  var n=Math.round(v);
  if(Math.abs(n)>=10000) return (n<0?"-":"")+"$"+(Math.abs(n)/1000).toFixed(0)+"k";
  if(Math.abs(n)>=1000) return (n<0?"-":"")+"$"+(Math.abs(n)/1000).toFixed(1)+"k";
  return (n>=0?"":"-")+"$"+Math.abs(n);
}

function equitySVG(trades,w,h2){
  var eq=[0];
  trades.slice().reverse().forEach(function(t){eq.push(eq[eq.length-1]+t.d)});
  if(eq.length<2){
    var empty=div("chart-wrap");
    empty.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:10px;font-family:Courier New,monospace">No trades yet</div>';
    return empty;
  }
  var mn=Math.min.apply(null,eq),mx=Math.max.apply(null,eq);
  var rng=mx-mn||1;
  var finalVal=eq[eq.length-1];
  var longestLbl=fmtAxisDollar(Math.abs(mn)>Math.abs(mx)?mn:mx);
  var pad2=Math.max(52,longestLbl.length*8);
  var padR=58,padB=18,padT=12;
  var W=w-pad2-padR,H=h2-padB-padT;
  function px(i){return pad2+(i/(eq.length-1))*W}
  function py(v){return padT+H-(v-mn)/rng*H}
  var zero=py(0);
  var gG="egG"+w+h2,gR="egR"+w+h2,cA="cA"+w+h2,cB="cB"+w+h2;

  var svg='<svg width="100%" viewBox="0 0 '+w+' '+h2+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<defs>';
  svg+='<linearGradient id="'+gG+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e676" stop-opacity="0.25"/><stop offset="100%" stop-color="#00e676" stop-opacity="0"/></linearGradient>';
  svg+='<linearGradient id="'+gR+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff4444" stop-opacity="0"/><stop offset="100%" stop-color="#ff4444" stop-opacity="0.25"/></linearGradient>';
  var aboveH=Math.max(0,Math.min(zero,padT+H)-padT);
  svg+='<clipPath id="'+cA+'"><rect x="0" y="'+padT+'" width="'+w+'" height="'+aboveH+'"/></clipPath>';
  var belowY=Math.max(padT,zero);var belowH=padT+H-belowY;
  svg+='<clipPath id="'+cB+'"><rect x="0" y="'+belowY+'" width="'+w+'" height="'+Math.max(0,belowH)+'"/></clipPath>';
  svg+='</defs>';

  // Grid + labels
  for(var s=0;s<=4;s++){
    var frac=s/4;
    var yg=(padT+H*(1-frac)).toFixed(1);
    var vg=mn+rng*frac;
    svg+='<line x1="'+pad2+'" y1="'+yg+'" x2="'+(pad2+W)+'" y2="'+yg+'" stroke="#1a3260" stroke-dasharray="2 4"/>';
    var lbl=fmtAxisDollar(vg);
    var lblCol=vg>0.5?"#00e676":vg<-0.5?"#ff4444":"#c9a84c";
    svg+='<text x="'+(pad2-6)+'" y="'+(parseFloat(yg)+4)+'" text-anchor="end" font-size="10" font-weight="600" font-family="Courier New,monospace" fill="'+lblCol+'">'+lbl+'</text>';
  }

  // Zero line + $0 label
  if(zero>=padT&&zero<=padT+H){
    svg+='<line x1="'+pad2+'" y1="'+zero.toFixed(1)+'" x2="'+(pad2+W)+'" y2="'+zero.toFixed(1)+'" stroke="#2a5099" stroke-width="1.5" stroke-dasharray="4 3"/>';
    svg+='<text x="'+(pad2-6)+'" y="'+(zero+4).toFixed(1)+'" text-anchor="end" font-size="9" font-family="Courier New,monospace" fill="#4d7ab8">$0</text>';
  }

  // Points string
  var pts=eq.map(function(v,i){return px(i).toFixed(1)+","+py(v).toFixed(1)}).join(" ");
  var zeroLine=pad2+","+zero.toFixed(1)+" "+(pad2+W).toFixed(1)+","+zero.toFixed(1);

  // Green fill above zero
  svg+='<polygon points="'+pts+" "+(pad2+W).toFixed(1)+","+zero.toFixed(1)+" "+pad2+","+zero.toFixed(1)+'" fill="url(#'+gG+')" clip-path="url(#'+cA+')"/>';
  // Red fill below zero
  svg+='<polygon points="'+pts+" "+(pad2+W).toFixed(1)+","+zero.toFixed(1)+" "+pad2+","+zero.toFixed(1)+'" fill="url(#'+gR+')" clip-path="url(#'+cB+')"/>';

  // Full polyline clipped green (above zero)
  svg+='<polyline points="'+pts+'" fill="none" stroke="#00e676" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" clip-path="url(#'+cA+')"/>';
  // Full polyline clipped red (below zero)
  svg+='<polyline points="'+pts+'" fill="none" stroke="#ff4444" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" clip-path="url(#'+cB+')"/>';

  // End dot + label
  var lastX=parseFloat(px(eq.length-1).toFixed(1));
  var lastY=parseFloat(py(finalVal).toFixed(1));
  var dotCol=finalVal>=0?"#00e676":"#ff4444";
  svg+='<circle cx="'+lastX+'" cy="'+lastY+'" r="4" fill="'+dotCol+'" stroke="#0d1e38" stroke-width="1.5"/>';
  var endLbl=(finalVal>=0?"+":"")+fmtAxisDollar(finalVal);
  svg+='<text x="'+(lastX+8)+'" y="'+(lastY+4)+'" text-anchor="start" font-size="11" font-weight="700" font-family="Courier New,monospace" fill="'+dotCol+'">'+endLbl+'</text>';
  svg+='</svg>';
  var wrap=div("chart-wrap");wrap.innerHTML=svg;return wrap;
}

function barSVG(data,w,h2){

  var mn=Math.min(0,Math.min.apply(null,vals)),mx=Math.max(0,Math.max.apply(null,vals));

  var padL=30,padB=18,padT=6;
  var W=w-padL,H=h2-padB-padT;
  var bw=Math.floor(W/data.length*0.6);
  var zero=padT+H-(-mn/rng)*H;
  var svg='<svg width="100%" viewBox="0 0 '+w+" "+h2+'" xmlns="http://www.w3.org/2000/svg">';
  [0.25,0.5,0.75,1].forEach(function(f){var y=padT+H*(1-f); svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(padL+W)+'" y2="'+y+'" stroke="#1a3260" stroke-dasharray="2 4"/>'});
  svg+='<line x1="'+padL+'" y1="'+zero+'" x2="'+(padL+W)+'" y2="'+zero+'" stroke="#2a5099"/>';
  data.forEach(function(d,i){
    var cx=padL+(i+0.5)*(W/data.length);
    var yv=padT+H-(d.v-mn)/rng*H;
    var ybar=Math.min(yv,zero),hbar=Math.abs(yv-zero);
    if(hbar<1) hbar=1;
    var col=d.v>=0?"#00e676":"#ff4444";
    svg+='<rect x="'+(cx-bw/2)+'" y="'+ybar+'" width="'+bw+'" height="'+hbar+'" fill="'+col+'" rx="2"/>';

  svg+='</svg>';
  var wrap=div("chart-wrap");wrap.innerHTML=svg;return wrap;
}

function lineSVG(data,w,h2,col){

function updateMobileNav(){
  var bnav=document.getElementById("m-bnav");
  if(!bnav) return;
  // Update active state on primary nav items
  var items=bnav.querySelectorAll(".bn-item[data-tab]");
  items.forEach(function(item){
    var t=item.getAttribute("data-tab");
    if(t===State.tab){item.classList.add("act");}
    else{item.classList.remove("act");}
    // If current tab is a "more" tab, highlight the "more" button
    if(t==="__more"){
      var moreTabIds=MORE_TABS;
      if(moreTabIds.indexOf(State.tab)>-1) item.classList.add("act");
    }
  });
  // Wire up click handlers (only once)
  if(!bnav._wired){
    bnav._wired=true;
    items.forEach(function(item){
      item.addEventListener("click",function(){
        var t=item.getAttribute("data-tab");
        if(t==="__more"){toggleMoreDrawer();}
        else{closeMoreDrawer();switchTab(t);}
      });
    });
    // FAB button

var _clockInterval=null;
function startClock(){
  if(_clockInterval) clearInterval(_clockInterval);
  function tick(){
    var tEl=document.getElementById("clk-time");
    var cdEl=document.getElementById("clk-countdown");
    if(!tEl||!cdEl) return;
    var now=new Date();
    var hh=now.getHours(),mm=now.getMinutes(),ss2=now.getSeconds();
    var ampm=hh>=12?"PM":"AM";
    var hh12=hh%12||12;
    tEl.textContent=(hh12<10?"0":"")+hh12+":"+(mm<10?"0":"")+mm+":"+(ss2<10?"0":"")+ss2+" "+ampm;

    // Get ET time for market countdown
    var etStr=new Date().toLocaleString("en-US",{timeZone:"America/New_York",hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
    var etParts=etStr.split(":");
    var etH=parseInt(etParts[0]),etM=parseInt(etParts[1]),etS=parseInt(etParts[2]);
    // Market close: 16:15 ET
    var closeH=16,closeM=15,closeS=0;
    var nowSecs=etH*3600+etM*60+etS;
    var closeSecs=closeH*3600+closeM*60+closeS;
    var openSecs=9*3600+30*60; // 9:30 AM ET open
    var day=new Date().toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short"});

    var etNow=new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
    var dayNum=etNow.getDay();

    if(dayNum===6){
      cdEl.style.color="#ff4444";cdEl.textContent="MARKET CLOSED";
    } else if(dayNum===0&&nowSecs<(18*3600)){
      var ethOpenSecs=18*3600;
      var diffA=ethOpenSecs-nowSecs;
      var chA=Math.floor(diffA/3600),cmA=Math.floor((diffA%3600)/60),csA=diffA%60;
      cdEl.style.color="#00e676";
      cdEl.textContent="ETH OPENS IN "+(chA>0?chA+"h ":"")+(cmA<10?"0":"")+cmA+":"+(csA<10?"0":"")+csA;
    } else if(dayNum===0){
      var mondayOpenSecs=9*3600+30*60;
      var diffB=((24*3600)-nowSecs)+mondayOpenSecs;
      var chB=Math.floor(diffB/3600),cmB=Math.floor((diffB%3600)/60),csB=diffB%60;
      cdEl.style.color="#00d4d4";
      cdEl.textContent="RTH OPENS IN "+(chB>0?chB+"h ":"")+(cmB<10?"0":"")+cmB+":"+(csB<10?"0":"")+csB;
    } else if(nowSecs<openSecs){
      // Pre-market countdown to open
      var diffC=openSecs-nowSecs;
      var chC=Math.floor(diffC/3600),cmC=Math.floor((diffC%3600)/60),csC=diffC%60;
      cdEl.style.color="#ffab00";
      cdEl.textContent="OPENS IN "+(chC>0?chC+"h ":"")+(cmC<10?"0":"")+cmC+":"+(csC<10?"0":"")+csC;
    } else if(nowSecs<closeSecs){
      // Countdown to close
      var diff2=closeSecs-nowSecs;
      var ch2=Math.floor(diff2/3600),cm2=Math.floor((diff2%3600)/60),cs2=diff2%60;
      cdEl.style.color="#ff4444";
      cdEl.textContent="CLOSE IN "+(ch2>0?ch2+"h ":"")+(cm2<10?"0":"")+cm2+":"+(cs2<10?"0":"")+cs2;
    } else {
      cdEl.style.color="#8fadd4";cdEl.textContent="MARKET CLOSED 4:15 PM";
    }
  }
  tick();
  _clockInterval=setInterval(tick,1000);
}

// Build P&L heatmap for a month
function mobilePnlHeatmap(trades){
  var now=new Date();
  var yr=now.getFullYear(),mo=now.getMonth();
  // Map trades by date key MM/DD (current month only)
  var byDate={};
  trades.forEach(function(t){
    if(!t.date) return;
    var p=t.date.split("/");if(p.length!==3)return;
    if(parseInt(p[0])-1!==mo||2000+parseInt(p[2])!==yr) return;
    var key=p[0]+"/"+p[1];
    byDate[key]=(byDate[key]||0)+t.d;
  });
  var maxAbs=0;
  Object.keys(byDate).forEach(function(k){var v=byDate[k];if(Math.abs(v)>maxAbs) maxAbs=Math.abs(v);});

  var wrap=document.createElement("div");

  // 6 columns: Sun Mon Tue Wed Thu Fri  (Saturday removed — market closed)
  var hdrs=document.createElement("div");
  hdrs.className="m-hm-hdrs";
  ["Su","Mo","Tu","We","Th","Fr"].forEach(function(d){
    var c=document.createElement("div");c.className="m-hm-hdr";c.textContent=d;hdrs.appendChild(c);
  });
  wrap.appendChild(hdrs);

  var grid=document.createElement("div");
  grid.className="m-hm-grid";

  var dim=new Date(yr,mo+1,0).getDate();
  var today=now.getDate();
  var mo2=mo+1;

  // Find what day-of-week the 1st falls on (0=Sun...6=Sat)
  // Sun=col 0, Mon=col 1 ... Fri=col 5, Sat=skipped
  var firstDow=new Date(yr,mo,1).getDay(); // 0=Sun
  // If month starts on Saturday (6), first visible col is Sunday of next week → offset=0 but skip day 1
  // Offset = firstDow if 0-5, or 0 if Saturday (day 1 gets pushed to Sunday slot next row)
  var offset=firstDow<=5?firstDow:0;

  // Pad empty cells before the 1st
  for(var e=0;e<offset;e++){
    var ec=document.createElement("div");ec.className="m-hm-cell hm-empty";grid.appendChild(ec);
  }

  for(var d=1;d<=dim;d++){
    var dow=new Date(yr,mo,d).getDay(); // 0=Sun...6=Sat
    // Skip Saturdays entirely — no cell added, no column shift
    if(dow===6) continue;

    var cell=document.createElement("div");
    var key2=(mo2<10?"0":"")+mo2+"/"+(d<10?"0":"")+d;
    var val=byDate[key2];
    var cls="hm-empty";
    if(val===undefined){cls=d<=today?"hm-zero":"hm-empty";}
    else if(val===0){cls="hm-zero";}
    else if(val>0){
      var ratio=maxAbs>0?val/maxAbs:0;
      cls=ratio>0.66?"hm-g3":ratio>0.33?"hm-g2":"hm-g1";
    } else {
      var ratio2=maxAbs>0?Math.abs(val)/maxAbs:0;
      cls=ratio2>0.66?"hm-r3":ratio2>0.33?"hm-r2":"hm-r1";
    }
    cell.className="m-hm-cell "+cls;
    if(val!==undefined){cell.title=dol(val);}
    if(d===today){cell.style.outline="1.5px solid #ff8c00";cell.style.outlineOffset="-1px";}
    (function(day,v){cell.addEventListener("click",function(){if(v!==undefined) alert(new Date(yr,mo,day).toDateString()+" : "+dol(v));});})(d,val);
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  return wrap;
}

function detectInstrument(s){
  var c=(s||"").toUpperCase().split(" ").join("").split(".")[0];
  if(c.indexOf("MES")===0) return "MES";
  if(c.indexOf("MNQ")===0) return "MNQ";
  if(c.indexOf("M2K")===0) return "M2K";
  if(c.indexOf("MYM")===0) return "MYM";
  if(c.indexOf("ES")===0)  return "ES";
  if(c.indexOf("NQ")===0)  return "NQ";
  if(c.indexOf("RTY")===0) return "RTY";
  if(c.indexOf("YM")===0)  return "YM";
  if(c.indexOf("CL")===0)  return "CL";
  if(c.indexOf("GC")===0)  return "GC";
  return "Other";
}

function fmtImportDate(raw){
  if(!raw) return today();
  raw=(raw+"").trim();
  // Strip ISO T separator
  raw=raw.split("T")[0];
  // Strip time component after space (e.g. "05/28/2026 9:42 AM" → "05/28/2026")
  raw=raw.split(" ")[0];
  var p;
  // YYYY-MM-DD or YYYY/MM/DD
  if(raw.length>=8&&(raw[4]==="-"||raw[4]==="/")){
    p=raw.split(raw[4]);
    if(p.length>=3) return pad(parseInt(p[1]))+"/"+pad(parseInt(p[2]))+"/"+p[0].slice(2);
  }
  // MM/DD/YYYY or M/D/YYYY
  p=raw.split("/");
  if(p.length===3){
    var yr=p[2].length===4?p[2].slice(2):p[2];
    return pad(parseInt(p[0]))+"/"+pad(parseInt(p[1]))+"/"+yr;
  }
  // MM-DD-YYYY
  p=raw.split("-");
  if(p.length===3&&p[0].length<=2){
    var yr2=p[2].length===4?p[2].slice(2):p[2];
    return pad(parseInt(p[0]))+"/"+pad(parseInt(p[1]))+"/"+yr2;
  }
  return today();
}

function fmtImportTime(raw){
  if(!raw) return "";
  raw=(raw+"").trim();
  // Handle ISO: "2026-05-28T09:42:15" or "2026-05-28 09:42:15"
  var dtPart=raw.indexOf("T")>-1?raw.split("T")[1]:raw.indexOf(" ")>-1?raw.split(" ").slice(1).join(" "):raw;
  // Extract HH:MM from whatever remains
  var m=dtPart.match(/(\d{1,2}):(\d{2})/);
  if(m){
    var hh=parseInt(m[1]);
    var mm=m[2];
    // Handle AM/PM
    if(dtPart.toLowerCase().indexOf("pm")>-1&&hh<12) hh+=12;
    if(dtPart.toLowerCase().indexOf("am")>-1&&hh===12) hh=0;
    return pad(hh)+":"+mm;
  }
  return "";
}

// Auto-assign session based on ET time (HH:MM string)
function autoSession(timeStr){
  if(!timeStr) return "RTH Open";
  var m=timeStr.match(/(\d{1,2}):(\d{2})/);
  if(!m) return "RTH Open";
  var mins=parseInt(m[1])*60+parseInt(m[2]);
  if(mins>=570&&mins<660)  return "RTH Open";   // 09:30–10:59
  if(mins>=660&&mins<960)  return "Full RTH";   // 11:00–15:59
  if(mins>=960&&mins<1080) return "Post-Market";// 16:00–17:59
  if(mins>=180&&mins<570)  return "London";     // 03:00–09:29
  return "Overnight";                           // 18:00–02:59
}

function parseCSVLines(text){
  // Split by newlines, handle \r\n and \n
  var lines=[];
  var cur="";
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(ch==="\r"){ if(text[i+1]==="\n") i++; lines.push(cur);cur=""; }
    else if(ch==="\n"){ lines.push(cur);cur=""; }
    else cur+=ch;
  }
  if(cur.trim()) lines.push(cur);
  return lines;
}

function stripQuotes(s){
  s=(s||"").trim();
  if(s[0]==='"'&&s[s.length-1]==='"') s=s.slice(1,-1);
  return s.trim();
}


function splitCSVRow(line){
  var result=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur);cur="";}
    else{cur+=ch;}
  }
  result.push(cur);
  return result;
}
function parseCSV(text){
  var lines=parseCSVLines(text).filter(function(l){return l.trim();});
  if(lines.length<2) return{trades:[],error:"Need a header row and at least one trade row."};
  var header=splitCSVRow(lines[0]).map(function(h){return stripQuotes(h).toLowerCase();});
  var rows=lines.slice(1).filter(function(l){return l.indexOf(",")>-1;});
  if(!rows.length) return{trades:[],error:"No data rows found after the header."};

  function col(row,names){
    for(var i=0;i<names.length;i++){
      var idx=header.indexOf(names[i]);
      if(idx>-1&&row[idx]!==undefined){var v=stripQuotes(row[idx]);if(v) return v;}
    }
    return "";
  }
  function cleanNum(s){return (s||"").replace(/[$]/g,"").replace(/,/g,"").trim();}

  var isTVPos=(header.indexOf("boughttimestamp")>-1||header.indexOf("bought timestamp")>-1)&&(header.indexOf("soldtimestamp")>-1||header.indexOf("sold timestamp")>-1)&&(header.indexOf("buyprice")>-1||header.indexOf("avg. buy")>-1||header.indexOf("buy price")>-1);
  var isNT=!isTVPos&&(header.indexOf("market pos.")>-1||header.indexOf("entry time")>-1||(header.indexOf("entry price")>-1&&header.indexOf("exit price")>-1&&header.indexOf("profit")>-1));
  var trades=[];

  rows.forEach(function(line,ri){
    var row=line.split(",");
    var t={};
    // Use a unique ID: timestamp base + row index*13 + random offset avoids collisions on bulk import
    var newId=Date.now()+ri*13+Math.floor(Math.random()*7);

    if(isTVPos){
      // ── Tradovate Position History CSV ──
      var tvInst=detectInstrument(col(row,["symbol","product","contract"]));
      var tvQty=cleanNum(col(row,["qty","paired qty","quantity"]))||"1";
      var boughtTs=col(row,["boughttimestamp","bought timestamp"]);
      var soldTs=col(row,["soldtimestamp","sold timestamp"]);
      var boughtDate=boughtTs?new Date(boughtTs):new Date(9999,0,1);
      var soldDate=soldTs?new Date(soldTs):new Date(9999,0,1);
      var tvIsShort=soldDate<boughtDate;
      var tvDir=tvIsShort?"Short":"Long";
      var entryTs=tvIsShort?soldTs:boughtTs;
      var avgBuy=cleanNum(col(row,["buyprice","avg. buy","buy price"]));
      var avgSell=cleanNum(col(row,["sellprice","avg. sell","sell price"]));
      var tvEntry=tvIsShort?avgSell:avgBuy;
      var tvExit=tvIsShort?avgBuy:avgSell;
      var tvPnlRaw=cleanNum(col(row,["pnl","p/l","p&l","profit"]));
      var tvPts=tvEntry&&tvExit?(parseFloat(tvExit)-parseFloat(tvEntry))*(tvDir==="Long"?1:-1):0;
      var tvTick=TICK[tvInst]||1;
      var tvDollar=tvPnlRaw?parseFloat(parseFloat(tvPnlRaw).toFixed(2)):parseFloat((tvPts*tvTick*parseFloat(tvQty)).toFixed(2));
      var tvTime=fmtImportTime(entryTs);
      var tvDate=fmtImportDate(entryTs);
      t={id:newId,date:tvDate,time:tvTime,inst:tvInst,dir:tvDir,entry:tvEntry,exit:tvExit,ctr:tvQty,setup:"",sess:autoSession(tvTime),conf:"",post:"",ex:"B",ru:"B",emo:3,right:"",wrong:"",pts:parseFloat(tvPts.toFixed(2)),d:tvDollar,hl:false};
    } else if(isNT){
      var ntInst=detectInstrument(col(row,["instrument","symbol"]));
      var ntDirRaw=col(row,["market pos.","market pos","direction","side"]).toLowerCase();
      var ntDir=ntDirRaw.indexOf("long")>-1?"Long":"Short";
      var ntQty=cleanNum(col(row,["quantity","qty"]))||"1";
      var ntEntry=cleanNum(col(row,["entry price","entryprice"]));
      var ntExit=cleanNum(col(row,["exit price","exitprice"]));
      var entryTime=col(row,["entry time","entrytime","time"]);
      var ntProfit=cleanNum(col(row,["profit","p&l","pnl","net profit"]));
      var mae=cleanNum(col(row,["mae"]));
      var mfe=cleanNum(col(row,["mfe"]));
      var ntDateStr=entryTime.split(" ")[0]||"";
      var ntTime=fmtImportTime(entryTime);
      var ntPts=ntEntry&&ntExit?(parseFloat(ntExit)-parseFloat(ntEntry))*(ntDir==="Long"?1:-1):0;
      var ntTick=TICK[ntInst]||1;
      var ntDollar=ntProfit?parseFloat(parseFloat(ntProfit).toFixed(2)):parseFloat((ntPts*ntTick*parseFloat(ntQty)).toFixed(2));
      t={id:newId,date:fmtImportDate(ntDateStr),time:ntTime,inst:ntInst,dir:ntDir,entry:ntEntry,exit:ntExit,ctr:ntQty,setup:"",sess:autoSession(ntTime),conf:"",post:"",ex:"B",ru:"B",emo:3,right:"",wrong:"",pts:parseFloat(ntPts.toFixed(2)),d:ntDollar,hl:false};
      if(mae) t.mae=mae;
      if(mfe) t.mfe=mfe;
    } else {
      var contract2=col(row,["contract","symbol","instrument","product"]);
      var inst2=detectInstrument(contract2);
      var action=col(row,["action","buy/sell","side","direction","type","order action"]).toLowerCase();
      var dir2=action.indexOf("buy")>-1||action.indexOf("long")>-1?"Long":"Short";
      var qty2=cleanNum(col(row,["qty","quantity","size","contracts","filled qty","paired qty"]))||"1";
      var entryP=cleanNum(col(row,["entry price","entry","avg price","avgprice","price","fill price","avg fill price","avg. buy","buy price"]));
      var exitP=cleanNum(col(row,["exit price","exit","avg. sell","sell price"]));
      var csvPnl=cleanNum(col(row,["pnl","p&l","p/l","profit","net p&l","realized p&l","realized pnl","net profit","profit/loss","gain/loss"]));
      var dateRaw=col(row,["date","trade date","datetime","date/time","filled at","timestamp","time"]);
      var timeRaw=col(row,["time","bought timestamp","sold timestamp","filled at","timestamp"]);
      if(!timeRaw||timeRaw===dateRaw) timeRaw=dateRaw;
      var parsedTime=fmtImportTime(timeRaw);
      var pts2=entryP&&exitP?(parseFloat(exitP)-parseFloat(entryP))*(dir2==="Long"?1:-1):0;
      var tv3=TICK[inst2]||1;
      var dollar2=csvPnl?parseFloat(parseFloat(csvPnl).toFixed(2)):parseFloat((pts2*tv3*parseFloat(qty2)).toFixed(2));
      t={id:newId,date:fmtImportDate(dateRaw),time:parsedTime,inst:inst2,dir:dir2,entry:entryP,exit:exitP,ctr:qty2,setup:"",sess:autoSession(parsedTime),conf:"",post:"",ex:"B",ru:"B",emo:3,right:"",wrong:"",pts:parseFloat((pts2).toFixed(2)),d:dollar2,hl:false};
    }
    if(t.inst) trades.push(t);
  });

  if(!trades.length) return{trades:[],error:"Parsed 0 trades. Check the platform selection matches your CSV format."};
  return{trades:trades,error:null};
}

function processCSV(text,source){
  var result=parseCSV(text);
  if(result.error){State.imp_msg={type:"err",text:"Error parsing "+source+": "+result.error};State.imp_preview=null;}
  else{State.imp_preview=result.trades;State.imp_msg={type:"info",text:"Parsed "+result.trades.length+" trades from "+source+". Review below then click IMPORT ALL."};}
  render();
}

// ── Tradovate API sync ─────────────────────────────────────────────
function syncTradovate(creds,days){
  var base=creds.env==="demo"?"https://demo.tradovate.com/v1":"https://live.tradovate.com/v1";
  var authBody={name:creds.user,password:creds.pass,appId:"EDGE Terminal",appVersion:"1.0",cid:parseInt(creds.cid)||0,sec:creds.sec||""};
  fetch(base+"/auth/accesstokenrequest",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(authBody)})
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.accessToken){
      State.imp_msg={type:"err",text:"Auth failed: "+(data.errorText||data.error||"Check credentials and try again.")};render();return;
    }
    ss("tv_token",data);State.tv_token=data;
    var token=data.accessToken;
    // Fetch fills
    return fetch(base+"/fill/list",{headers:{"Authorization":"Bearer "+token}})
    .then(function(r){return r.json();})
    .then(function(fills){
      if(!Array.isArray(fills)){State.imp_msg={type:"err",text:"Could not fetch fills. "+(fills.errorText||"")};render();return;}
      // Convert fills to paired trades
      var cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
      var trades=parseTradovateFills(fills.filter(function(f){return new Date(f.timestamp)>=cutoff;}));
      State.imp_preview=trades;
      var now=new Date();State.tv_lastSync=now.toLocaleDateString()+" "+now.toLocaleTimeString();ss("tv_lastSync",State.tv_lastSync);
      State.imp_msg={type:"ok",text:"✓ Fetched "+trades.length+" trades from Tradovate. Review below."};render();
    });
  })
  .catch(function(err){
    State.imp_msg={type:"err",text:"Connection error: "+err.message+". Check your credentials and that CORS is allowed."};render();
  });
}

function parseTradovateFills(fills){
  // Group fills by orderId or pair buys/sells by contract
  var trades=[];
  var byContract={};
  fills.forEach(function(f){
    var inst=detectInstrument(f.contractId||f.contract||"");
    if(!byContract[inst]) byContract[inst]=[];
    byContract[inst].push(f);
  });
  Object.keys(byContract).forEach(function(inst){
    var fs=byContract[inst].slice().sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
    var i=0;
    while(i<fs.length){
      var entry=fs[i];
      var exit2=fs[i+1];
      if(exit2){
        var dir=entry.action==="Buy"?"Long":"Short";
        var entryP=(entry.price||0).toString();
        var exitP=(exit2.price||0).toString();
        var qty=(entry.qty||1).toString();
        var pts=(parseFloat(exitP)-parseFloat(entryP))*(dir==="Long"?1:-1);
        var tv2=TICK[inst]||1;
        var dollar=parseFloat((pts*tv2*parseFloat(qty)).toFixed(2));
        trades.push({id:Date.now()+i,date:fmtImportDate(entry.timestamp),time:fmtImportTime(entry.timestamp),inst:inst,dir:dir,entry:entryP,exit:exitP,ctr:qty,setup:"",sess:autoSession(fmtImportTime(entry.timestamp)),conf:"",post:"",ex:"B",ru:"B",emo:3,right:"",wrong:"",pts:parseFloat(pts.toFixed(2)),d:dollar,hl:false});
        i+=2;
      } else { i++; }
    }
  });
  return trades;
}

}

        borderUpColor:"#00e676",borderDownColor:"#ff4444",
        wickUpColor:"#00e676",wickDownColor:"#ff4444",
      });

      series.setData(candles);

      // Show last price + update footer
      var last=candles[candles.length-1];
      var lastEl=div("xs m");lastEl.style.cssText="margin-top:6px;text-align:right;font-weight:700;font-size:12px;";

      el.appendChild(lastEl);
      note.textContent="Live data via Yahoo Finance • "+new Date().toLocaleTimeString();

      // Resize handler
      var ro=new ResizeObserver(function(){
        chart.applyOptions({width:chartDiv.offsetWidth});
      });
      ro.observe(chartDiv);
    })
    .catch(function(e){
      loading.style.color="var(--red)";
      loading.textContent="⚠ Could not load chart: "+e.message+" — check connection or try refreshing";
    });
  }

  // Load lightweight-charts lib if not already loaded
  if(window.LightweightCharts){
    fetchAndRender();
  } else {
    var script=document.createElement("script");
    script.src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js";

    };
    document.head.appendChild(script);
  }

  return el;
}

  // SVG diagram builder for each open type
  function buildOpenDiagram(typeId){

    var S=14; // row spacing
    var svgParts=[];

    svgParts.push('<rect width="220" height="360" fill="#040d1a" rx="4"/>');
    svgParts.push('<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#e05555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>');

    function linePlain(x1,y1,x2,y2,col,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(col||'#5b9bd5')+'" stroke-width="'+(w||2)+'"/>';}
    function circle(cx,cy){return '<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="none" stroke="#e05555" stroke-width="1.5"/>';}
    function letter(x,y,l){return '<text x="'+x+'" y="'+y+'" font-size="11" fill="#5b9bd5" font-family="Courier New">'+l+'</text>';}
    function col(letters,y,ax){var s='';letters.forEach(function(l,i){s+=letter(ax+(i*12),y,l);});return s;}

    var AX=50; // left edge of A column
    var LX1=10, LX2=160; // open line x extents
    var conviction,convCol;

    if(typeId==='od'){
      // Open Drive: open line at top, A column drops straight down
      var oy=46;
      svgParts.push('<text x="4" y="42" font-size="9" fill="#e0c97a" font-family="Courier New" font-style="italic">Open</text>');
      svgParts.push(linePlain(LX1,oy,LX2,oy));
      svgParts.push(circle(AX+3,oy));

      svgParts.push(col(['A'],oy-14*3,AX));
      svgParts.push(col(['A'],oy-14*2,AX));
      svgParts.push(col(['A'],oy-14,AX));

      // second circle at turn point (where B starts)
      svgParts.push(circle(AX+12+3, oy+14+(7*S)));
      // up arrow (test above)
      svgParts.push(line(AX+30,oy-4,AX+30,oy-14*3-4,'#e05555'));
      // down arrow (drive below)

function render(){
  renderTabs();
  renderTopbar();
  var content=document.getElementById("content");
  closeMoreDrawer();

  var tabChanged=(State.tab!==_lastRenderedTab);
  _lastRenderedTab=State.tab;

  if(isMobile()){
    content.style.padding="12px";
    content.style.overflow="visible";
    content.style.display="block";

    if(tabChanged){
      // Tab switch: scroll to top, crossfade in
      window.scrollTo(0,0);
      content.style.transition="none";
      content.style.opacity="0";
      content.innerHTML="";
      content.appendChild(VIEWS[State.tab]());
      content.getBoundingClientRect();
      content.style.transition="opacity .15s ease";
      content.style.opacity="1";
    } else {
      // In-page state update: save scroll, re-render, restore — no jump
      var savedScroll=window.pageYOffset||document.documentElement.scrollTop||document.body.scrollTop||0;
      content.style.transition="none";
      content.style.opacity="1";
      content.innerHTML="";
      content.appendChild(VIEWS[State.tab]());
      if(savedScroll>0 && !_firstRender) requestAnimationFrame(function(){window.scrollTo(0,savedScroll);});
    }
  } else {
    content.style.transition="none";
    content.style.opacity="1";
    content.innerHTML="";
    content.style.padding="0";
    content.style.overflow="";
    content.style.padding="16px";content.style.overflow="auto";content.style.display="block";
    content.appendChild(VIEWS[State.tab]());
  }
  if(_firstRender){ window.scrollTo(0,0); _firstRender=false; }
}

  .then(function(rows){
    if(!Array.isArray(rows)||!rows.length) return;

      // Convert to dashboard trade format
      var inst=detectInstrument(row.instrument||"ES");
      var tv2=TICK[inst]||1;
      var newTrade={
        id:Date.now()+Math.floor(Math.random()*1000),
        date:fmtImportDate((row.time||"").split("T")[0]),
        time:fmtImportTime(row.time||""),
        inst:inst,

        setup:"",
        sess:row.session||"RTH Open",
        conf:"",post:"",
        ex:"B",ru:"B",emo:3,
        right:"",wrong:"",
        pts:0,d:0,hl:false,
        tv_id:row.id
      };
      // Check not already imported
      var exists=State.trades.some(function(t){return t.tv_id===row.id;});
      if(!exists){
        State.trades.unshift(newTrade);
        added++;
      }
    });
    if(added>0){
      ss("trades",State.trades);
      // Mark as processed
      var ids=rows.map(function(r){return r.id;}).join(",");
      supaFetch("PATCH","tv_trades?id=in.("+ids+")",{processed:true});
      render();
      // Show notification
      showTVNotification(added);
    }
  })
  .catch(function(){});
}

function showTVNotification(count){
  var existing=document.getElementById("tv-notify");
  if(existing) existing.remove();
  var n=document.createElement("div");
  n.id="tv-notify";
  n.style.cssText="position:fixed;bottom:20px;right:20px;background:#112444;border:1px solid var(--ca);color:var(--ca);font-family:monospace;font-size:12px;padding:10px 16px;border-radius:4px;z-index:9999;box-shadow:0 4px 20px #00000060;";
  n.textContent="⬆ "+count+" new trade"+(count>1?"s":"")+" from TradingView";
  document.body.appendChild(n);
  setTimeout(function(){if(n.parentNode) n.remove();},4000);
}

// Start polling every 5 seconds only if TradingView credentials are configured
if(supaClient&&State.tv_creds&&(State.tv_creds.user||State.tv_creds.cid)) setInterval(pollTVTrades,5000);

// Poll edge_data every 10 seconds to stay in sync across computers
// Guard: skip if user has a form open to avoid wiping unsaved changes
setInterval(function(){
  if(State.adding||State.editing||State.pb_adding||State.pb_editing!==undefined) return;
  var currentId=getSyncId();
  var snapBefore=JSON.stringify({trades:State.trades,levels:State.levels,weekLevels:State.weekLevels});
  loadFromCloud(currentId,function(ok){
    if(!ok) return;
    var snapAfter=JSON.stringify({trades:State.trades,levels:State.levels,weekLevels:State.weekLevels});
    if(snapAfter!==snapBefore) render();
  });
},10000);

// Re-render on resize (mobile <-> desktop breakpoint)
var _lastMobile=isMobile();
window.addEventListener("resize",function(){
  var nowMobile=isMobile();
  if(nowMobile!==_lastMobile){_lastMobile=nowMobile;render();}
});



var _reloadTab=sessionStorage.getItem('edge_reload_tab');
if(_reloadTab){sessionStorage.removeItem('edge_reload_tab');State.tab=_reloadTab;}
// First render is now triggered by the cloud loader above
</script>
</body>
</html>
