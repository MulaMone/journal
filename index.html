<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDGE — Trading Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#040d1a;--bg2:#071428;--bg3:#0a1a32;--panel:#0d1e38;--panel2:#112444;--panel3:#162c50;--border:#1a3260;--accent:#00d4d4;--accentglow:#00d4d430;--ca:#ff8c00;--caglow:#ff8c0025;--ca15:#ff8c0015;--ca30:#ff8c0030;--ca40:#ff8c0040;--ca50:#ff8c0050;--text:#e8f0ff;--text2:#e0c97a;--text3:#c9a84c;--green:#00e676;--red:#ff4444;--amber:#ffab00}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;overflow:hidden;font-size:15px}
#app{display:flex;flex-direction:column;height:100vh}
/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.logo{font-size:26px;font-weight:700;letter-spacing:4px;color:var(--accent)}
.brand-name{font-family:'Cinzel',serif;font-size:24px;font-weight:900;letter-spacing:10px;word-spacing:4px;background:linear-gradient(135deg,#ffd700 0%,#ff8c00 50%,#ffd700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;text-transform:uppercase}
.logo small{color:var(--text3);font-size:14px;font-weight:400;margin-left:10px;letter-spacing:2px}
#topbar-stats{display:flex;gap:18px;font-size:14px}
#topbar-stats span{color:var(--text3)}
#topbar-stats b{font-weight:600}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* TABS */
#tabs{display:flex;gap:1px;padding:0 14px;height:44px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{padding:0 13px;height:44px;display:flex;align-items:center;gap:5px;font-size:12px;letter-spacing:1px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px}
::-webkit-scrollbar{width:5px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px;margin-bottom:12px}
/* CARD */
.card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:18px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-t{font-size:12px;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
/* CHIP */
.chip{background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:13px 16px}
.chip .cl{font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.chip .cv{font-size:22px;font-weight:700}
.chip .cs{font-size:11px;color:var(--text3);margin-top:3px}
/* COLORS */
.g{color:var(--green)}.r{color:var(--red)}.a{color:var(--amber)}.b{color:var(--ca)}.m{color:var(--text3)}.ac{color:var(--accent)}
/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:2px;font-size:10px;font-weight:600}
.bg{background:#00e67615;color:var(--green);border:1px solid #00e67635}
.br{background:#ff444415;color:var(--red);border:1px solid #ff444435}
.bb{background:var(--ca15);color:var(--ca);border:1px solid var(--ca30)}
.ba{background:#ffab0015;color:var(--amber);border:1px solid #ffab0035}
.bw{background:var(--panel3);color:var(--text2);border:1px solid var(--border)}
/* Importance levels */
.imp-high{background:#ff444418;color:#ff6b6b;border:1px solid #ff444450;font-weight:700}
.imp-med{background:#ffab0018;color:#ffcc44;border:1px solid #ffab0050;font-weight:700}
.imp-low{background:#00d4d415;color:#00d4d4;border:1px solid #00d4d440;font-weight:700}
/* Mini calendar */
.cal-popup{position:absolute;z-index:99;background:var(--panel2);border:1px solid var(--border2);border-radius:5px;padding:10px;box-shadow:0 8px 32px #00000060;width:224px;margin-top:2px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav b{font-size:11px;letter-spacing:1px;color:var(--text2)}
.cal-nav button{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:3px;cursor:pointer;width:22px;height:22px;font-size:11px;line-height:1}
.cal-nav button:hover{border-color:var(--ca);color:var(--ca)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dh{font-size:15px;text-align:center;color:var(--text3);padding:6px 0;letter-spacing:1px;font-weight:700}
.cal-day{font-size:13px;text-align:center;padding:6px 3px;border-radius:3px;cursor:pointer;color:var(--text2)}
.cal-day:hover{background:var(--panel3);color:var(--text)}
.cal-day.today{border:1px solid var(--ca);color:var(--ca)}
.cal-day.selected{background:var(--ca);color:#fff;font-weight:700}
.cal-day.empty{cursor:default}
/* Import */
.drop-zone{border:2px dashed var(--border2);border-radius:5px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--panel2)}
.drop-zone:hover,.drop-zone.over{border-color:var(--ca);background:var(--panel3)}
.drop-zone input[type=file]{display:none}
.drop-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.preview-tbl{width:100%;border-collapse:collapse;font-size:10px;margin-top:8px}
.preview-tbl th{padding:6px 8px;text-align:left;color:var(--text3);font-size:11px;letter-spacing:1px;border-bottom:1px solid var(--border)}
.preview-tbl td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-size:12px}
.imp-msg{padding:10px 14px;border-radius:4px;font-size:11px;margin-bottom:12px;font-family:'Courier New',monospace}
.imp-ok{background:#00e67615;border:1px solid #00e67640;color:var(--green)}
.imp-err{background:#ff444415;border:1px solid #ff444440;color:var(--red)}
.imp-info{background:var(--ca15);border:1px solid var(--ca30);color:var(--ca)}
.sync-status{display:flex;align-items:center;gap:8px;font-size:10px;padding:8px 12px;border-radius:3px;background:var(--panel3);border:1px solid var(--border);font-family:"Courier New",monospace}
.sync-dot-on{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.sync-dot-off{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.field-group{margin-bottom:10px}
.field-group label{font-size:11px;letter-spacing:1.5px;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase}
.plt-btn{padding:7px 16px;border:1px solid var(--border2);background:var(--panel2);color:var(--text2);font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;border-radius:3px;cursor:pointer;transition:all .15s}
.plt-btn.sel{border-color:var(--ca);color:var(--ca);background:var(--ca15)}
.plt-btn:hover{border-color:var(--ca);color:var(--ca)}
/* +/- spinner */
.ctr-wrap{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;background:var(--panel2)}
.ctr-wrap input{border:none;border-radius:0;border-left:1px solid var(--border);border-right:1px solid var(--border);text-align:center;width:100%;min-width:0}
.ctr-btn{background:var(--panel3);border:none;color:var(--text2);font-size:15px;cursor:pointer;width:30px;height:32px;flex-shrink:0;line-height:1}
.ctr-btn:hover{background:var(--border2);color:var(--text)}
/* GRADE */
.gr{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:2px;font-size:12px;font-weight:700}
.grA{background:#00e67618;color:var(--green);border:1px solid #00e67638}
.grB{background:var(--ca15);color:var(--ca);border:1px solid var(--ca30)}
.grC{background:#ffab0018;color:var(--amber);border:1px solid #ffab0038}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:8px 10px;text-align:left;color:var(--text3);font-size:11px;letter-spacing:1px;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);font-size:13px}
.tbl tr.tr-click:hover td{background:var(--panel2);cursor:pointer}
.tbl tr.exp-open td{background:var(--panel2)}
/* SECTION HEADER */
.sh{font-size:13px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sh:before{content:'';width:3px;height:13px;background:var(--ca);display:inline-block}
/* LEVEL ROW */
.lvrow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.lvrow.checked .lv-label{text-decoration:line-through;opacity:0.38}
.lvrow.checked .lv-badge{opacity:0.35}
.lv-check{width:18px;height:18px;border-radius:3px;border:1px solid var(--border2);background:var(--panel3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.lv-check:hover{border-color:var(--ca)}
.lv-check.on{background:var(--ca15);border-color:var(--ca40)}
.lv-check.on::after{content:"✓";font-size:11px;color:var(--ca);font-weight:700}
.lvrow:last-child{border-bottom:none}
/* QUOTE */
.qblock{background:var(--panel2);border-left:3px solid var(--ca);padding:11px 14px;border-radius:0 4px 4px 0;margin-bottom:12px}
.qtext{font-size:13px;color:var(--text2);font-style:italic;line-height:1.7}
.qauth{font-size:11px;color:var(--text3);margin-top:5px;letter-spacing:1px}
/* FORM */
.fg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:10px}
.fg .s2{grid-column:span 2}.fg .s4{grid-column:span 4}
input,select,textarea{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Courier New',monospace;font-size:13px;padding:8px 10px;border-radius:3px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ca)}
select option{background:var(--panel2)}
label{font-size:11px;letter-spacing:1.5px;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase}
/* BTN */
.btn{padding:7px 16px;border:1px solid var(--ca);background:transparent;color:var(--ca);font-family:'Courier New',monospace;font-size:12px;letter-spacing:1px;border-radius:3px;cursor:pointer}
.btn:hover{background:var(--caglow)}
.btn-g{border-color:var(--green);color:var(--green)}
.btn-g:hover{background:#00e67610}
.btn-r{border-color:var(--red);color:var(--red)}
.btn-r:hover{background:#ff444410}
/* MISC */
.sep{height:1px;background:var(--border);margin:12px 0}
.xs{font-size:12px}.sm{font-size:13px}.fw7{font-weight:700}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.row{display:flex;align-items:center}.rjb{display:flex;align-items:center;justify-content:space-between}.gap8{gap:8px}.gap12{gap:12px}
.pbc{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:9px}
.setup-title{font-size:16px;font-weight:700;letter-spacing:.5px;color:var(--text);font-family:'Arial','Helvetica',sans-serif}
.opp{background:linear-gradient(135deg,var(--panel2),var(--panel3));border:1px solid #1e3d73;border-radius:4px;padding:14px;margin-bottom:10px}
/* SVG CHART */
.chart-wrap{overflow:hidden;margin-top:6px}
svg text{font-family:'Courier New',monospace}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="row gap8"><div class="logo">EDGE<small>TERMINAL</small></div><span class="dot"></span></div>
    <div class="brand-name">BILLION$</div>
    <div id="topbar-stats"></div>
  </div>
  <div id="tabs"></div>
  <div id="content"></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────
var QUOTES=[
  {t:"Trade what you see, not what you think.",a:"— Unknown"},
  {t:"It's not whether you're right or wrong, but how much you make when right and lose when wrong.",a:"— George Soros"},
  {t:"The goal of a successful trader is to make the best trades. Money is secondary.",a:"— Alexander Elder"},
  {t:"Risk comes from not knowing what you're doing.",a:"— Warren Buffett"},
  {t:"The market can stay irrational longer than you can stay solvent.",a:"— J.M. Keynes"}
];
var INSTR=["ES","NQ","MES","MNQ","CL","GC","Other"];
var SESSIONS=["Overnight","London","RTH Open","Full RTH","Post-Market"];
var SETUPS=["Volume Profile — VAH/VAL","Volume Profile — POC","Momentum — Trend Continuation","Mean Reversion — VWAP Fade","Mean Reversion — Extension Fade","Opening Range","2min POC","MA Pullback"];
var SDESC={
  "Volume Profile — VAH/VAL":"React to key volume profile levels (VAH, VAL). Look for acceptance or rejection as price interacts with high-volume nodes.",
  "Volume Profile — POC":"POC acts as a magnet. Trade reactions after a deviation — look for price to return and auction through or reject.",
  "Momentum — Trend Continuation":"Enter in direction of established trend after a pullback or consolidation. Confirm with price structure.",
  "Mean Reversion — VWAP Fade":"Fade extended moves away from VWAP. Best used when price is 1–2 standard deviations extended with divergence.",
  "Mean Reversion — Extension Fade":"Fade overextended moves looking to return to value. Use volume analysis to confirm exhaustion.",
  "Opening Range":"Trade breakouts or fades of the opening range (first 15–30 min). Confirm with volume and broader market context.",
  "2min POC":"Naked 2min POC with confluences.",
  "MA Pullback":"Pull back into 1, 2, 3, 5, 30min:20ma, 1hr, 1hr:100ma."
};
var TICK={ES:50,NQ:20,MES:5,MNQ:2,CL:10,GC:10,Other:1};
var EMO=["","😖","😟","😐","😊","🔥"];
var QI=Math.floor(Math.random()*QUOTES.length);

var DEFAULT_TRADES=[
  {id:1,date:"05/28/26",time:"09:42",inst:"ES",dir:"Long",entry:"5280.50",exit:"5291.25",ctr:"2",setup:"Momentum — Trend Continuation",sess:"RTH Open",conf:"Gap fill above VWAP, strong buyer activity at POC",post:"Clean entry, held through retest, exited at target",ex:"A",ru:"A",emo:5,right:"Patient on entry, trusted the level",wrong:"Could have held longer",pts:10.75,d:1075,hl:true},
  {id:2,date:"05/28/26",time:"10:15",inst:"NQ",dir:"Short",entry:"18740.00",exit:"18712.50",ctr:"1",setup:"Mean Reversion — VWAP Fade",sess:"RTH Open",conf:"Extended above VWAP 2SD, rejected at VAH",post:"Quick fade, covered too early",ex:"B",ru:"A",emo:4,right:"Identified setup correctly",wrong:"Covered 15pts early, left $300 on table",pts:27.5,d:550,hl:false},
  {id:3,date:"05/27/26",time:"08:22",inst:"ES",dir:"Long",entry:"5265.00",exit:"5260.25",ctr:"2",setup:"Volume Profile — POC",sess:"London",conf:"POC test overnight, EU session momentum",post:"Stopped out, structure broke below POC",ex:"C",ru:"B",emo:2,right:"Setup was valid pre-entry",wrong:"Ignored divergence in order flow before entry",pts:-4.75,d:-475,hl:false}
];
var DEFAULT_LEVELS=[{l:"VAH/VAL/POC",imp:"high",sess:""},{l:"PDH/PDL",imp:"high",sess:""},{l:"VWAP",imp:"medium",sess:""},{l:"BIZZ",imp:"medium",sess:""},{l:"ONH/ONL",imp:"low",sess:"Overnight"},{l:"OPEN",imp:"low",sess:""}];

// ─── STATE ───────────────────────────────────────────────────────────
function ls(k,def){try{var v=localStorage.getItem("edge_"+k);return v?JSON.parse(v):def}catch(e){return def}}
function ss(k,v){try{localStorage.setItem("edge_"+k,JSON.stringify(v))}catch(e){}}

var State={
  tab:"home",
  trades:ls("trades",DEFAULT_TRADES),
  levels:ls("levels",DEFAULT_LEVELS),
  note:ls("note","Focus on RTH open momentum. Wait for clear structure above VWAP before entering."),
  expanded:null,
  adding:false,
  editing:null,
  weekLevels:ls("weekLevels",[]),
  levelChecks:ls("levelChecks",{}),
  levelChecksDate:ls("levelChecksDate",""),
  pb_adding:false,
  pb_editing:undefined,
  rv_view:"month",
  rv_year:undefined,
  rv_month:undefined,
  rv_selected_day:null,
  imp_platform:"tradovate",
  imp_preview:null,
  imp_msg:"",
  tv_creds:ls("tv_creds",{user:"",pass:"",cid:"",sec:"",env:"live"}),
  tv_token:ls("tv_token",null),
  tv_lastSync:ls("tv_lastSync",""),
  nt_lastSync:ls("nt_lastSync",""),
  nt_fileHandle:null,
  sync_tab:"tradovate",
  mindsetChecks:ls("mindsetChecks",{}),
  mindsetChecksDate:ls("mindsetChecksDate",""),
  mindsetNote:ls("mindsetNote",""),
  wkGoal:ls("wkGoal","$2,000 net P&L. Focus on A/B setups only. No revenge trading."),
  moGoal:ls("moGoal","$8,000 net P&L. Build out playbook with 20+ tagged trades per setup.")
};
// Migrate old PDH/PDL split levels to combined
(function(){
  var lvls=State.levels;
  var hasPDH=lvls.some(function(l){return l.l==="PDH";});
  var hasPDL=lvls.some(function(l){return l.l==="PDL";});
  var hasVAH=lvls.some(function(l){return l.l==="VAH";});
  var hasVAL=lvls.some(function(l){return l.l==="VAL";});
  var changed=false;
  if(hasPDH||hasPDL){
    lvls=lvls.filter(function(l){return l.l!=="PDH"&&l.l!=="PDL";});
    lvls.unshift({l:"PDH/PDL",imp:"high",sess:""});
    changed=true;
  }
  if(hasVAH||hasVAL){
    lvls=lvls.filter(function(l){return l.l!=="VAH"&&l.l!=="VAL";});
    var pocIdx=lvls.findIndex?lvls.findIndex(function(l){return l.l==="POC";}):2;
    if(pocIdx>-1) lvls.splice(pocIdx+1,0,{l:"VAH/VAL/POC",imp:"high",sess:""});
    else lvls.push({l:"VAH/VAL/POC",imp:"high",sess:""});
    changed=true;
  }
  if(changed){State.levels=lvls;ss("levels",lvls);}
  // Add BIZZ and OPEN if not present
  var hasBIZZ=State.levels.some(function(l){return l.l==="BIZZ";});
  var hasOPEN=State.levels.some(function(l){return l.l==="OPEN";});
  if(!hasBIZZ){State.levels.push({l:"BIZZ",imp:"medium",sess:""});ss("levels",State.levels);}
  if(!hasOPEN){State.levels.push({l:"OPEN",imp:"low",sess:""});ss("levels",State.levels);}
  var hasONH=State.levels.some(function(l){return l.l==="ONH/ONL";});
  if(!hasONH){State.levels.push({l:"ONH/ONL",imp:"low",sess:"Overnight"});ss("levels",State.levels);}
  // Update importances and rename VAH/VAL → VAH/VAL POC, remove POC
  State.levels.forEach(function(l){
    if(l.l==="VAH/VAL"||l.l==="VAH/VAL POC"||l.l==="VAH/VAL/POC"){l.l="VAH/VAL/POC";l.imp="high";}
    if(l.l==="VWAP") l.imp="medium";
  });
  State.levels=State.levels.filter(function(l){return l.l!=="POC";});
  // Put VAH/VAL/POC first
  var vahIdx=State.levels.findIndex(function(l){return l.l==="VAH/VAL/POC";});
  if(vahIdx>0){var vah=State.levels.splice(vahIdx,1)[0];State.levels.unshift(vah);}
  // Put OPEN last
  var openIdx=State.levels.findIndex(function(l){return l.l==="OPEN";});
  if(openIdx>-1&&openIdx!==State.levels.length-1){var openLvl=State.levels.splice(openIdx,1)[0];State.levels.push(openLvl);}
  ss("levels",State.levels);
})();

// ─── HELPERS ─────────────────────────────────────────────────────────
function dol(n){n=n||0;return(n>=0?"+":"")+"$"+Math.abs(n).toFixed(0)}
function clr(n){return (n||0)>=0?"g":"r"}
function grc(g){return "gr"+g}
function today(){var d=new Date();return pad(d.getMonth()+1)+"/"+pad(d.getDate())+"/"+String(d.getFullYear()).slice(2)}
function pad(n){return n<10?"0"+n:n}
function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==="className") el.className=attrs[k];
    else if(k==="innerHTML") el.innerHTML=attrs[k];
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else el.setAttribute(k,attrs[k]);
  });
  if(children){
    if(!Array.isArray(children)) children=[children];
    children.forEach(function(c){if(c!=null){if(typeof c==="string"||typeof c==="number") el.appendChild(document.createTextNode(c)); else el.appendChild(c);}});
  }
  return el;
}
function div(cls,children){return h("div",{className:cls||""},children)}
function span(cls,text){return h("span",{className:cls||""},typeof text!=="undefined"?[text]:[])}

// ─── STATS HELPERS ───────────────────────────────────────────────────
function calcStats(trades){
  var wins=trades.filter(function(t){return t.d>0});
  var losses=trades.filter(function(t){return t.d<0});
  var total=trades.reduce(function(a,t){return a+t.d},0);
  var wr=trades.length?(wins.length/trades.length*100).toFixed(0):0;
  var avgW=wins.length?wins.reduce(function(a,t){return a+t.d},0)/wins.length:0;
  var avgL=losses.length?losses.reduce(function(a,t){return a+t.d},0)/losses.length:0;
  return{wins:wins,losses:losses,total:total,wr:wr,avgW:avgW,avgL:avgL};
}

function fmtAxisDollar(v){
  var n=Math.round(v);
  if(Math.abs(n)>=10000) return (n<0?"-":"")+"$"+(Math.abs(n)/1000).toFixed(0)+"k";
  if(Math.abs(n)>=1000) return (n<0?"-":"")+"$"+(Math.abs(n)/1000).toFixed(1)+"k";
  return (n>=0?"":"-")+"$"+Math.abs(n);
}

function equitySVG(trades,w,h2){
  var eq=[0];
  trades.slice().reverse().forEach(function(t){eq.push(eq[eq.length-1]+t.d)});
  if(eq.length<2){
    var empty=div("chart-wrap");
    empty.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:10px;font-family:Courier New,monospace">No trades yet</div>';
    return empty;
  }
  var mn=Math.min.apply(null,eq),mx=Math.max.apply(null,eq);
  var rng=mx-mn||1;
  var finalVal=eq[eq.length-1];
  var lineCol=finalVal>=0?"#00e676":"#ff4444";
  // Dynamic left pad based on longest label
  var longestLbl=fmtAxisDollar(Math.abs(mn)>Math.abs(mx)?mn:mx);
  var pad2=Math.max(52, longestLbl.length*8);
  var padR=50,padB=18,padT=12;
  var W=w-pad2-padR,H=h2-padB-padT;
  function px(i){return pad2+(i/(eq.length-1))*W}
  function py(v){return padT+H-(v-mn)/rng*H}
  var pts=eq.map(function(v,i){return px(i).toFixed(1)+","+py(v).toFixed(1)}).join(" ");
  var fillPts=pad2+","+py(mn).toFixed(1)+" "+pts+" "+px(eq.length-1).toFixed(1)+","+py(mn).toFixed(1);
  var zero=py(0);
  var gradId="eg"+w+h2;
  var svg='<svg width="100%" viewBox="0 0 '+w+' '+h2+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<defs><linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1">';
  svg+='<stop offset="0%" stop-color="'+lineCol+'" stop-opacity="0.28"/>';
  svg+='<stop offset="100%" stop-color="'+lineCol+'" stop-opacity="0"/>';
  svg+='</linearGradient></defs>';
  // 5 horizontal grid lines with $ labels
  for(var s=0;s<=4;s++){
    var frac=s/4;
    var yg=(padT+H*(1-frac)).toFixed(1);
    var vg=mn+rng*frac;
    svg+='<line x1="'+pad2+'" y1="'+yg+'" x2="'+(pad2+W)+'" y2="'+yg+'" stroke="#1a3260" stroke-dasharray="2 4"/>';
    var lbl=fmtAxisDollar(vg);
    var lblCol=vg>0.5?"#00e676":vg<-0.5?"#ff4444":"#c9a84c";
    svg+='<text x="'+(pad2-6)+'" y="'+(parseFloat(yg)+4)+'" text-anchor="end" font-size="10" font-weight="600" font-family="Courier New,monospace" fill="'+lblCol+'">'+lbl+'</text>';
  }
  // Zero line
  if(zero>=padT&&zero<=padT+H){
    svg+='<line x1="'+pad2+'" y1="'+zero.toFixed(1)+'" x2="'+(pad2+W)+'" y2="'+zero.toFixed(1)+'" stroke="#2a5099" stroke-width="1.5" stroke-dasharray="4 3"/>';
    svg+='<text x="'+(pad2-6)+'" y="'+(zero+4).toFixed(1)+'" text-anchor="end" font-size="9" font-family="Courier New,monospace" fill="#2a5099">$0</text>';
  }
  // Fill + line
  svg+='<polygon points="'+fillPts+'" fill="url(#'+gradId+')"/>';
  svg+='<polyline points="'+pts+'" fill="none" stroke="'+lineCol+'" stroke-width="2.5"/>';
  // End dot
  var lastX=px(eq.length-1).toFixed(1);
  var lastY=py(finalVal).toFixed(1);
  svg+='<circle cx="'+lastX+'" cy="'+lastY+'" r="4" fill="'+lineCol+'" stroke="var(--panel)" stroke-width="1.5"/>';
  // End value label
  var endLbl=(finalVal>=0?"+":"")+fmtAxisDollar(finalVal);
  svg+='<text x="'+(parseFloat(lastX)+8)+'" y="'+(parseFloat(lastY)+4)+'" text-anchor="start" font-size="11" font-weight="700" font-family="Courier New,monospace" fill="'+lineCol+'">'+endLbl+'</text>';
  svg+='</svg>';
  var wrap=div("chart-wrap");wrap.innerHTML=svg;return wrap;
}

function barSVG(data,w,h2){

  var mn=Math.min(0,Math.min.apply(null,vals)),mx=Math.max(0,Math.max.apply(null,vals));

  [0.25,0.5,0.75,1].forEach(function(f){var y=padT+H*(1-f); svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(padL+W)+'" y2="'+y+'" stroke="#1a3260" stroke-dasharray="2 4"/>'});
  svg+='<line x1="'+padL+'" y1="'+zero+'" x2="'+(padL+W)+'" y2="'+zero+'" stroke="#2a5099"/>';
  data.forEach(function(d,i){
    var cx=padL+(i+0.5)*(W/data.length);
    var yv=padT+H-(d.v-mn)/rng*H;

    svg+='<text x="'+cx+'" y="'+(h2-4)+'" text-anchor="middle" font-size="8" fill="#c9a84c">'+d.l+'</text>';
  });
  [mn,mx].forEach(function(v){if(v===0)return; var y=padT+H-(v-mn)/rng*H; svg+='<text x="'+(padL-4)+'" y="'+(y+4)+'" text-anchor="end" font-size="9" fill="#c9a84c">$'+Math.round(v)+'</text>'});
  svg+='</svg>';

}

var _clockInterval=null;
function startClock(){
  if(_clockInterval) clearInterval(_clockInterval);
  function tick(){
    var tEl=document.getElementById("clk-time");
    var cdEl=document.getElementById("clk-countdown");
    if(!tEl||!cdEl) return;
    var now=new Date();
    var hh=now.getHours(),mm=now.getMinutes(),ss2=now.getSeconds();
    var ampm=hh>=12?"PM":"AM";
    var hh12=hh%12||12;
    tEl.textContent=(hh12<10?"0":"")+hh12+":"+(mm<10?"0":"")+mm+":"+(ss2<10?"0":"")+ss2+" "+ampm;

    // Get ET time for market countdown
    var etStr=new Date().toLocaleString("en-US",{timeZone:"America/New_York",hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
    var etParts=etStr.split(":");
    var etH=parseInt(etParts[0]),etM=parseInt(etParts[1]),etS=parseInt(etParts[2]);
    // Market close: 16:15 ET
    var closeH=16,closeM=15,closeS=0;
    var nowSecs=etH*3600+etM*60+etS;
    var closeSecs=closeH*3600+closeM*60+closeS;
    var openSecs=9*3600+30*60; // 9:30 AM ET open
    var day=new Date().toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short"});
    var isWeekend=(day==="Sat"||day==="Sun");

    if(isWeekend){
      cdEl.style.color="#ff4444";cdEl.textContent="MARKET CLOSED";
    } else if(nowSecs<openSecs){
      // Pre-market countdown to open
      var diff=openSecs-nowSecs;
      var ch=Math.floor(diff/3600),cm=Math.floor((diff%3600)/60),cs=diff%60;
      cdEl.style.color="#ffab00";
      cdEl.textContent="OPENS IN "+(ch>0?ch+"h ":"")+(cm<10?"0":"")+cm+":"+(cs<10?"0":"")+cs;
    } else if(nowSecs<closeSecs){
      // Countdown to close
      var diff2=closeSecs-nowSecs;
      var ch2=Math.floor(diff2/3600),cm2=Math.floor((diff2%3600)/60),cs2=diff2%60;
      cdEl.style.color="#ff4444";
      cdEl.textContent="CLOSE IN "+(ch2>0?ch2+"h ":"")+(cm2<10?"0":"")+cm2+":"+(cs2<10?"0":"")+cs2;
    } else {
      cdEl.style.color="#8fadd4";cdEl.textContent="MARKET CLOSED 4:15 PM";
    }
  }
  tick();
  _clockInterval=setInterval(tick,1000);
}

function detectInstrument(s){
  var c=(s||"").toUpperCase().split(" ").join("").split(".")[0];
  if(c.indexOf("MES")===0) return "MES";
  if(c.indexOf("MNQ")===0) return "MNQ";
  if(c.indexOf("ES")===0)  return "ES";
  if(c.indexOf("NQ")===0)  return "NQ";
  if(c.indexOf("CL")===0)  return "CL";
  if(c.indexOf("GC")===0)  return "GC";
  return "Other";
}

function fmtImportDate(raw){
  if(!raw) return today();
  raw=(raw+"").trim().split("T")[0];
  var p;
  // YYYY-MM-DD or YYYY/MM/DD
  if(raw.length>=10 && (raw[4]==="-"||raw[4]==="/")){
    p=raw.split(raw[4]);
    if(p.length>=3) return (p[1].length===1?"0":"")+p[1]+"/"+(p[2].length===1?"0":"")+p[2]+"/"+p[0].slice(2);
  }
  // MM/DD/YYYY or M/D/YYYY
  p=raw.split("/");
  if(p.length===3){
    var yr=p[2].length===4?p[2].slice(2):p[2];
    return (p[0].length===1?"0":"")+p[0]+"/"+(p[1].length===1?"0":"")+p[1]+"/"+yr;
  }
  return today();
}

function fmtImportTime(raw){
  if(!raw) return "";
  // look for HH:MM pattern in the string
  var parts=(raw+"").split(":");
  if(parts.length>=2){
    var hh=parts[0].trim().split(" ");hh=hh[hh.length-1];
    var mm=parts[1].slice(0,2);
    if(hh.length>0&&mm.length>0) return (hh.length===1?"0":"")+hh+":"+mm;
  }
  return "";
}

function parseCSVLines(text){
  // Split by newlines, handle \r\n and \n
  var lines=[];
  var cur="";
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(ch==="\r"){ if(text[i+1]==="\n") i++; lines.push(cur);cur=""; }
    else if(ch==="\n"){ lines.push(cur);cur=""; }
    else cur+=ch;
  }
  if(cur.trim()) lines.push(cur);
  return lines;
}

function stripQuotes(s){
  s=(s||"").trim();
  if(s[0]==='"'&&s[s.length-1]==='"') s=s.slice(1,-1);
  return s.trim();
}

function parseCSV(text){
  var lines=parseCSVLines(text).filter(function(l){return l.trim();});
  if(lines.length<2) return{trades:[],error:"Need a header row and at least one trade row."};
  var header=lines[0].split(",").map(function(h){return stripQuotes(h).toLowerCase();});
  var rows=lines.slice(1).filter(function(l){return l.indexOf(",")>-1;});
  if(!rows.length) return{trades:[],error:"No data rows found after the header."};

  function col(row,names){
    for(var i=0;i<names.length;i++){
      var idx=header.indexOf(names[i]);
      if(idx>-1&&row[idx]!==undefined){var v=stripQuotes(row[idx]);if(v) return v;}
    }
    return "";
  }
  function cleanNum(s){return (s||"").replace("$","").replace(",","").trim();}

  var isNT=header.indexOf("market pos.")>-1||header.indexOf("entry time")>-1||(header.indexOf("entry price")>-1&&header.indexOf("exit price")>-1&&header.indexOf("profit")>-1);
  var trades=[];

  rows.forEach(function(line,ri){
    var row=line.split(",");
    var t={};

    if(isNT){
      var inst=detectInstrument(col(row,["instrument","symbol"]));
      var dirRaw=col(row,["market pos.","market pos","direction","side"]).toLowerCase();
      var dir=dirRaw.indexOf("long")>-1?"Long":"Short";
      var qty=cleanNum(col(row,["quantity","qty"]))||"1";
      var entry=cleanNum(col(row,["entry price","entryprice"]));
      var exit2=cleanNum(col(row,["exit price","exitprice"]));
      var entryTime=col(row,["entry time","entrytime","time"]);
      var profit=cleanNum(col(row,["profit","p&l","pnl","net profit"]));
      var mae=cleanNum(col(row,["mae"]));
      var mfe=cleanNum(col(row,["mfe"]));
      var dateStr=entryTime.split(" ")[0]||"";
      var timeStr=fmtImportTime(entryTime);
      var pts=entry&&exit2?(parseFloat(exit2)-parseFloat(entry))*(dir==="Long"?1:-1):0;
      var tv2=TICK[inst]||1;
      var dollar=profit?Math.round(parseFloat(profit)):Math.round(pts*tv2*parseFloat(qty));
      t={id:Date.now()+ri*7,date:fmtImportDate(dateStr),time:timeStr,inst:inst,dir:dir,entry:entry,exit:exit2,ctr:qty,setup:"",sess:"RTH Open",conf:"",post:"",ex:"B",ru:"B",emo:3,right:"",wrong:"",pts:parseFloat(pts.toFixed(2)),d:dollar,hl:false};
      if(mae) t.mae=mae;
      if(mfe) t.mfe=mfe;
    } else {
      var contract=col(row,["contract","symbol","instrument","product"]);
      var inst2=detectInstrument(contract);
      var action=col(row,["action","buy/sell","side","direction","type","order action"]).toLowerCase();
      var dir2=action.indexOf("buy")>-1||action.indexOf("long")>-1?"Long":"Short";
      var qty2=cleanNum(col(row,["qty","quantity","size","contracts","filled qty"]))||"1";
      var entryP=cleanNum(col(row,["entry price","entry","avg price","avgprice","price","fill price","avg fill price"]));
      var exitP=cleanNum(col(row,["exit price","exit"]));
      var pnl=cleanNum(col(row,["pnl","p&l","profit","net p&l","realized p&l","realized pnl","net profit"]));
      var dateRaw=col(row,["date","datetime","date/time","filled at","timestamp","time"]);
      var timeRaw=col(row,["time","filled at","timestamp"]);
      var pts2=entryP&&exitP?(parseFloat(exitP)-parseFloat(entryP))*(dir2==="Long"?1:-1):0;
      var tv3=TICK[inst2]||1;
      var dollar2=pnl?Math.round(parseFloat(pnl)):Math.round(pts2*tv3*parseFloat(qty2));
      t={id:Date.now()+ri*7,date:fmtImportDate(dateRaw),time:fmtImportTime(timeRaw),inst:inst2,dir:dir2,entry:entryP,exit:exitP,ctr:qty2,setup:"",sess:"RTH Open",conf:"",post:"",ex:"B",ru:"B",emo:3,right:"",wrong:"",pts:parseFloat((pts2).toFixed(2)),d:dollar2,hl:false};
    }
    if(t.inst) trades.push(t);
  });

  if(!trades.length) return{trades:[],error:"Parsed 0 trades. Check the platform selection matches your CSV format."};
  return{trades:trades,error:null};
}

function processCSV(text,source){
  var result=parseCSV(text);
  if(result.error){State.imp_msg={type:"err",text:"Error parsing "+source+": "+result.error};State.imp_preview=null;}
  else{State.imp_preview=result.trades;State.imp_msg={type:"info",text:"Parsed "+result.trades.length+" trades from "+source+". Review below then click IMPORT ALL."};}
  render();
}

// ── Tradovate API sync ─────────────────────────────────────────────
function syncTradovate(creds,days){
  var base=creds.env==="demo"?"https://demo.tradovate.com/v1":"https://live.tradovate.com/v1";
  var authBody={name:creds.user,password:creds.pass,appId:"EDGE Terminal",appVersion:"1.0",cid:parseInt(creds.cid)||0,sec:creds.sec||""};
  fetch(base+"/auth/accesstokenrequest",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(authBody)})
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.accessToken){
      State.imp_msg={type:"err",text:"Auth failed: "+(data.errorText||data.error||"Check credentials and try again.")};render();return;
    }
    ss("tv_token",data);State.tv_token=data;
    var token=data.accessToken;
    // Fetch fills
    return fetch(base+"/fill/list",{headers:{"Authorization":"Bearer "+token}})
    .then(function(r){return r.json();})
    .then(function(fills){
      if(!Array.isArray(fills)){State.imp_msg={type:"err",text:"Could not fetch fills. "+(fills.errorText||"")};render();return;}
      // Convert fills to paired trades
      var cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
      var trades=parseTradovateFills(fills.filter(function(f){return new Date(f.timestamp)>=cutoff;}));
      State.imp_preview=trades;
      var now=new Date();State.tv_lastSync=now.toLocaleDateString()+" "+now.toLocaleTimeString();ss("tv_lastSync",State.tv_lastSync);
      State.imp_msg={type:"ok",text:"✓ Fetched "+trades.length+" trades from Tradovate. Review below."};render();
    });
  })
  .catch(function(err){
    State.imp_msg={type:"err",text:"Connection error: "+err.message+". Check your credentials and that CORS is allowed."};render();
  });
}

function parseTradovateFills(fills){
  // Group fills by orderId or pair buys/sells by contract
  var trades=[];
  var byContract={};
  fills.forEach(function(f){
    var inst=detectInstrument(f.contractId||f.contract||"");
    if(!byContract[inst]) byContract[inst]=[];
    byContract[inst].push(f);
  });
  Object.keys(byContract).forEach(function(inst){
    var fs=byContract[inst].slice().sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
    var i=0;
    while(i<fs.length){
      var entry=fs[i];
      var exit2=fs[i+1];
      if(exit2){
        var dir=entry.action==="Buy"?"Long":"Short";
        var entryP=(entry.price||0).toString();
        var exitP=(exit2.price||0).toString();
        var qty=(entry.qty||1).toString();
        var pts=(parseFloat(exitP)-parseFloat(entryP))*(dir==="Long"?1:-1);
        var tv2=TICK[inst]||1;
        var dollar=Math.round(pts*tv2*parseFloat(qty));
        trades.push({id:Date.now()+i,date:fmtImportDate(entry.timestamp),time:fmtImportTime(entry.timestamp),inst:inst,dir:dir,entry:entryP,exit:exitP,ctr:qty,setup:"",sess:"RTH Open",conf:"",post:"",ex:"B",ru:"B",emo:3,right:"",wrong:"",pts:parseFloat(pts.toFixed(2)),d:dollar,hl:false});
        i+=2;
      } else { i++; }
    }
  });
  return trades;
}

function loadNTFile(){
  if(!State.nt_fileHandle){State.imp_msg={type:"err",text:"No file linked. Select a file first."};render();return;}
  State.nt_fileHandle.getFile().then(function(file){
    return file.text();
  }).then(function(text){
    var result=parseCSV(text);
    if(result.error){State.imp_msg={type:"err",text:"Parse error: "+result.error};render();return;}
    State.imp_preview=result.trades;
    var now=new Date();State.nt_lastSync=now.toLocaleDateString()+" "+now.toLocaleTimeString();ss("nt_lastSync",State.nt_lastSync);
    State.imp_msg={type:"ok",text:"✓ Loaded "+result.trades.length+" trades from NinjaTrader file."};render();
  }).catch(function(err){
    State.imp_msg={type:"err",text:"Could not read file: "+err.message};render();
  });
}

var VIEWS={home:homeTab,prep:prepTab,log:logTab,opps:oppsTab,playbook:playbookTab,analytics:analyticsTab,review:reviewTab,import:importTab};

function render(){
  renderTabs();
  renderTopbar();
  var content=document.getElementById("content");
  content.innerHTML="";
  content.appendChild(VIEWS[State.tab]());
}

render();
</script>
